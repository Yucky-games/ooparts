<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ブルアカ オーパーツ管理</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone@7.23.10/babel.min.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" data-presets="react,env">
    const { useState, useEffect } = React;

    // ==========================================
    // ★ ここがマスターデータです ★
    // Wikiを見ながら、この形式で生徒を増やしてください。
    // 「Other」は、ノーマル・パッシブ・サブスキルの共通消費テーブルです。
    // ==========================================
    const STUDENT_MASTER = {

      // ========== あ行 ==========
      "アスナ（制服）": {
        EX: {
          3: { "初級アンティキティラ装置": 32 }, // EX 2→3 で消費
          4: { "中級アンティキティラ装置": 25 }, // EX 3→4 で消費
          5: { "上級アンティキティラ装置": 11 }  // EX 4→5 で消費
        },
        Other: {
          5: { "初級アンティキティラ装置": 13 }, // その他 4→5 で消費
          6: { "初級アンティキティラ装置": 16 }, // その他 5→6 で消費
          7: { "上級アンティキティラ装置": 12 }, // その他 6→7 で消費
          9: { "上級アンティキティラ装置": 13 }  // その他 8→9 で消費
        }
      },

      // ========== か行 ==========
      // （ここにか行の生徒データを追加します）


      // ========== さ行 ==========
      "シロコ": {
        EX: {
          2: { "初級ネブラディスク": 12 },
          3: { "初級ネブラディスク": 18, "中級ネブラディスク": 15 },
          4: { "中級ネブラディスク": 18, "上級ネブラディスク": 12 },
          5: { "上級ネブラディスク": 20, "最上級ネブラディスク": 8 }
        },
        Other: {
          2: { "初級ネブラディスク": 5 },
          5: { "中級ネブラディスク": 10 }
        }
      },

      // ========== た行 ==========
      // （ここにた行の生徒データを追加します）


      // ========== な行 ==========
      // （ここにな行の生徒データを追加します）


      // ========== は行 ==========
      // （ここには行の生徒データを追加します）


      // ========== ま行 ==========
      // （ここにま行の生徒データを追加します）


      // ========== や行 ==========
      // （ここにや行の生徒データを追加します）


      // ========== ら行 ==========
      // （ここにら行の生徒データを追加します）


      // ========== わ行 ==========
      // （ここにわ行の生徒データを追加します）

    };

    // Firebaseの初期化設定
    const firebaseConfig = {
      apiKey: "AIzaSyAlm6ETTvRL1zlTMhAznbqYlh9NXThIZS0",
      authDomain: "ba-materials-app.firebaseapp.com",
      projectId: "ba-materials-app",
      storageBucket: "ba-materials-app.firebasestorage.app",
      messagingSenderId: "488191018366",
      appId: "1:488191018366:web:9bffda0a35b36c0af65f2f"
    };

    if (!firebase.apps.length) {
      firebase.initializeApp(firebaseConfig);
    }
    const auth = firebase.auth();
    const db = firebase.firestore();
    const getCollectionPath = (userId, colName) => `users/${userId}/${colName}`;

    // アイコン定義
    const IconChart = () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 3v18h18"/><path d="M18 17V9"/><path d="M13 17V5"/><path d="M8 17v-3"/></svg>;
    const IconUser = () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>;
    const IconPackage = () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m7.5 4.27 9 5.15"/><path d="M21 8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16Z"/><path d="m3.3 7 8.7 5 8.7-5"/><path d="M12 22V12"/></svg>;
    const IconPlus = () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M5 12h14"/><path d="M12 5v14"/></svg>;
    const IconTrash = () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/></svg>;

    // 内部計算ロジック：生徒1人の必要素材を算出
    const calcRequirements = (student) => {
      const requirements = {};
      const master = STUDENT_MASTER[student.name];
      if (!master) return [];

      const cur = student.currentSkills || { EX: 1, NS: 1, PS: 1, SS: 1 };
      const tgt = student.targetSkills || { EX: 1, NS: 1, PS: 1, SS: 1 };

      // EXの差分計算
      if (master.EX) {
        for (let lv = cur.EX + 1; lv <= tgt.EX; lv++) {
          if (master.EX[lv]) {
            Object.entries(master.EX[lv]).forEach(([item, count]) => {
              requirements[item] = (requirements[item] || 0) + count;
            });
          }
        }
      }

      // その他(NS, PS, SS)の差分計算
      if (master.Other) {
        ['NS', 'PS', 'SS'].forEach(skill => {
          for (let lv = cur[skill] + 1; lv <= tgt[skill]; lv++) {
            if (master.Other[lv]) {
              Object.entries(master.Other[lv]).forEach(([item, count]) => {
                requirements[item] = (requirements[item] || 0) + count;
              });
            }
          }
        });
      }

      return Object.entries(requirements).map(([name, count]) => ({ name, count }));
    };

    function App() {
      const [user, setUser] = useState(null);
      const [activeTab, setActiveTab] = useState('inventory'); // 所持数タブを初期表示に変更
      const [students, setStudents] = useState([]);
      const [inventory, setInventory] = useState([]);
      
      // あいうえお順にソートした生徒名リスト
      const studentNameList = Object.keys(STUDENT_MASTER).sort((a, b) => a.localeCompare(b, 'ja'));
      const [selectedNewStudent, setSelectedNewStudent] = useState(studentNameList[0] || "");

      useEffect(() => {
        auth.signInAnonymously().catch(err => console.error("Login Error:", err));
        const unsubscribeAuth = auth.onAuthStateChanged((currentUser) => {
          setUser(currentUser);
          if (currentUser) {
            const unsubStudents = db.collection(getCollectionPath(currentUser.uid, 'students'))
              .onSnapshot(snapshot => {
                setStudents(snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() })));
              });
            const unsubInventory = db.collection(getCollectionPath(currentUser.uid, 'inventory'))
              .onSnapshot(snapshot => {
                setInventory(snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() })));
              });
            return () => { unsubStudents(); unsubInventory(); };
          }
        });
        return () => unsubscribeAuth();
      }, []);

      // 生徒の追加（プルダウンから）
      const addStudent = async () => {
        if (!user || !selectedNewStudent) return;
        if (students.find(s => s.name === selectedNewStudent)) {
          alert("この生徒は既に登録されています。");
          return;
        }
        await db.collection(getCollectionPath(user.uid, 'students')).add({
          name: selectedNewStudent,
          currentSkills: { EX: 1, NS: 1, PS: 1, SS: 1 },
          targetSkills: { EX: 1, NS: 1, PS: 1, SS: 1 }
        });
      };

      // 生徒削除
      const deleteStudent = async (studentId) => {
        if (!user || !window.confirm("削除しますか？")) return;
        await db.doc(`${getCollectionPath(user.uid, 'students')}/${studentId}`).delete();
      };

      // スキルレベルの更新
      const updateSkill = async (student, skillType, isTarget, value) => {
        if (!user) return;
        const curSkills = { ...(student.currentSkills || { EX: 1, NS: 1, PS: 1, SS: 1 }) };
        const tgtSkills = { ...(student.targetSkills || { EX: 1, NS: 1, PS: 1, SS: 1 }) };

        if (isTarget) {
          tgtSkills[skillType] = value;
          // 目標が現状より低くなったら現状も合わせる
          if (tgtSkills[skillType] < curSkills[skillType]) curSkills[skillType] = value;
        } else {
          curSkills[skillType] = value;
          // 現状が目標より高くなったら目標も合わせる
          if (curSkills[skillType] > tgtSkills[skillType]) tgtSkills[skillType] = value;
        }

        await db.doc(`${getCollectionPath(user.uid, 'students')}/${student.id}`).update({
          currentSkills: curSkills,
          targetSkills: tgtSkills
        });
      };

      // 所持品更新
      const updateInventory = async (matName, count) => {
        if (!user) return;
        if (count < 0) count = 0;
        const existingItem = inventory.find(i => i.name === matName);
        if (existingItem) {
          await db.doc(`${getCollectionPath(user.uid, 'inventory')}/${existingItem.id}`).update({ count: count });
        } else {
          await db.collection(getCollectionPath(user.uid, 'inventory')).add({ name: matName, count: count });
        }
      };

      // 所持品削除（手動追加分を消すための関数）
      const deleteInventoryItem = async (itemId) => {
        if (!user || !window.confirm("このデータを削除しますか？")) return;
        await db.doc(`${getCollectionPath(user.uid, 'inventory')}/${itemId}`).delete();
      };

      // 集計処理
      const dashboardData = () => {
        const totals = {};
        students.forEach(student => {
          const reqs = calcRequirements(student);
          reqs.forEach(req => {
            if (!totals[req.name]) totals[req.name] = 0;
            totals[req.name] += req.count;
          });
        });

        const data = [];
        Object.keys(totals).forEach(matName => {
          const requiredCount = totals[matName];
          const inventoryItem = inventory.find(i => i.name === matName);
          const ownedCount = inventoryItem ? inventoryItem.count : 0;
          data.push({ name: matName, required: requiredCount, owned: ownedCount, difference: ownedCount - requiredCount });
        });
        return data.sort((a, b) => a.difference - b.difference);
      };

      // === 所持数リストの生成ロジック ===
      // マスターデータから全オーパーツ名を自動抽出
      const masterMaterials = Array.from(new Set(
        Object.values(STUDENT_MASTER).flatMap(student => [
          ...Object.values(student.EX || {}).flatMap(reqs => Object.keys(reqs)),
          ...Object.values(student.Other || {}).flatMap(reqs => Object.keys(reqs))
        ])
      )).sort((a, b) => a.localeCompare(b, 'ja'));

      // 所持品表示用リスト
      const inventoryDisplayList = masterMaterials.map(name => {
        const invItem = inventory.find(i => i.name === name);
        return {
          id: invItem ? invItem.id : null,
          name: name,
          count: invItem ? invItem.count : 0,
          isMaster: true
        };
      });

      // データベース上に存在するがマスターにないもの（間違えて登録したものなど）を追加
      inventory.forEach(invItem => {
        if (!masterMaterials.includes(invItem.name)) {
          inventoryDisplayList.push({
            id: invItem.id,
            name: invItem.name,
            count: invItem.count,
            isMaster: false
          });
        }
      });


      if (!user) return <div className="flex h-screen items-center justify-center bg-blue-50 text-blue-900">接続中...</div>;

      return (
        <div className="flex flex-col h-screen bg-gray-50 text-gray-800 font-sans">
          <header className="bg-blue-600 text-white p-4 shadow-md flex justify-between items-center">
            <h1 className="text-xl font-bold">ブルアカ オーパーツ管理</h1>
            <div className="text-sm opacity-80">ID: {user.uid.substring(0, 5)}</div>
          </header>

          <div className="flex bg-white shadow-sm border-b">
            <button onClick={() => setActiveTab('dashboard')} className={`flex-1 p-3 flex justify-center items-center gap-2 border-b-2 ${activeTab === 'dashboard' ? 'border-blue-600 text-blue-600 font-bold' : 'border-transparent text-gray-500'}`}>
              <IconChart /> 不足確認
            </button>
            <button onClick={() => setActiveTab('students')} className={`flex-1 p-3 flex justify-center items-center gap-2 border-b-2 ${activeTab === 'students' ? 'border-blue-600 text-blue-600 font-bold' : 'border-transparent text-gray-500'}`}>
              <IconUser /> 育成目標
            </button>
            <button onClick={() => setActiveTab('inventory')} className={`flex-1 p-3 flex justify-center items-center gap-2 border-b-2 ${activeTab === 'inventory' ? 'border-blue-600 text-blue-600 font-bold' : 'border-transparent text-gray-500'}`}>
              <IconPackage /> 所持数
            </button>
          </div>

          <main className="flex-1 overflow-y-auto p-4 max-w-3xl mx-auto w-full">
            
            {activeTab === 'dashboard' && (
              <div>
                <h2 className="text-lg font-bold mb-4 text-gray-700">必要オーパーツ集計</h2>
                <div className="bg-white rounded-lg shadow overflow-hidden">
                  <table className="w-full text-left border-collapse">
                    <thead>
                      <tr className="bg-gray-100 text-gray-600 text-sm">
                        <th className="p-3 border-b">オーパーツ名</th>
                        <th className="p-3 border-b text-right">必要数</th>
                        <th className="p-3 border-b text-right">所持数</th>
                        <th className="p-3 border-b text-right">差分</th>
                      </tr>
                    </thead>
                    <tbody>
                      {dashboardData().length === 0 ? (
                        <tr><td colSpan="4" className="p-6 text-center text-gray-400">育成目標を設定してください。</td></tr>
                      ) : (
                        dashboardData().map((item, idx) => (
                          <tr key={idx} className="border-b hover:bg-gray-50">
                            <td className="p-3 font-medium">{item.name}</td>
                            <td className="p-3 text-right">{item.required}</td>
                            <td className="p-3 text-right text-blue-600 font-semibold">{item.owned}</td>
                            <td className={`p-3 text-right font-bold ${item.difference < 0 ? 'text-red-500' : 'text-green-500'}`}>
                              {item.difference < 0 ? item.difference : `+${item.difference}`}
                            </td>
                          </tr>
                        ))
                      )}
                    </tbody>
                  </table>
                </div>
              </div>
            )}

            {activeTab === 'students' && (
              <div>
                <div className="bg-white p-4 rounded-lg shadow mb-6 flex gap-2">
                  <select 
                    value={selectedNewStudent} 
                    onChange={(e) => setSelectedNewStudent(e.target.value)}
                    className="border rounded p-2 flex-1 text-sm bg-gray-50"
                  >
                    {studentNameList.map(name => <option key={name} value={name}>{name}</option>)}
                  </select>
                  <button onClick={addStudent} className="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg flex items-center gap-1 text-sm">
                    <IconPlus /> 追加
                  </button>
                </div>

                <div className="space-y-4">
                  {students.map(student => {
                    const curSkills = student.currentSkills || { EX: 1, NS: 1, PS: 1, SS: 1 };
                    const tgtSkills = student.targetSkills || { EX: 1, NS: 1, PS: 1, SS: 1 };
                    const reqMats = calcRequirements(student);

                    return (
                      <div key={student.id} className="bg-white p-4 rounded-lg shadow border border-gray-100">
                        <div className="flex justify-between items-center mb-3 border-b pb-2">
                          <h3 className="font-bold text-lg text-blue-900">{student.name}</h3>
                          <button onClick={() => deleteStudent(student.id)} className="text-red-400 hover:text-red-600 p-1"><IconTrash /></button>
                        </div>
                        
                        <div className="space-y-2">
                          <div className="flex text-xs text-gray-500 mb-1 px-1">
                            <span className="w-16">スキル</span>
                            <span className="flex-1 text-center pr-4">現状レベル → 目標レベル</span>
                          </div>
                          {['EX', 'NS', 'PS', 'SS'].map(skill => {
                            const isEX = skill === 'EX';
                            const maxLv = isEX ? 5 : 10;
                            return (
                              <div key={skill} className="flex justify-between items-center text-sm bg-gray-50 p-2 rounded">
                                <span className="font-semibold w-12 text-gray-700">{skill}</span>
                                <div className="flex items-center gap-2">
                                  <select value={curSkills[skill]} onChange={(e) => updateSkill(student, skill, false, parseInt(e.target.value))} className="border rounded p-1 w-12 text-center bg-white">
                                    {[...Array(maxLv)].map((_, i) => <option key={i+1} value={i+1}>{i+1}</option>)}
                                  </select>
                                  <span className="text-gray-400">→</span>
                                  <select value={tgtSkills[skill]} onChange={(e) => updateSkill(student, skill, true, parseInt(e.target.value))} className="border rounded p-1 w-12 text-center bg-white font-semibold text-blue-700">
                                    {[...Array(maxLv)].map((_, i) => <option key={i+1} value={i+1}>{i+1}</option>)}
                                  </select>
                                </div>
                              </div>
                            );
                          })}
                        </div>

                        <div className="mt-4 pt-3 border-t">
                          <div className="text-xs text-gray-500 mb-2">目標達成に必要なオーパーツ (自動計算)</div>
                          {reqMats.length === 0 ? (
                            <div className="text-sm text-gray-400">必要な素材はありません</div>
                          ) : (
                            <div className="flex flex-wrap gap-2">
                              {reqMats.map(req => (
                                <span key={req.name} className="bg-blue-50 text-blue-800 border border-blue-200 text-xs px-2 py-1 rounded-full font-medium">
                                  {req.name}: {req.count}
                                </span>
                              ))}
                            </div>
                          )}
                        </div>
                      </div>
                    )
                  })}
                </div>
              </div>
            )}

            {activeTab === 'inventory' && (
              <div>
                <h2 className="text-lg font-bold mb-4 text-gray-700">現在の所持数入力</h2>
                <div className="bg-white p-4 rounded-lg shadow mb-6">
                  <p className="text-sm text-gray-600 mb-2">オーパーツの所持数を入力してください。</p>
                  <p className="text-xs text-gray-500">※ここにはプログラムに登録されたオーパーツが自動で一覧表示されます。自分で新しく種類を追加することはできません。</p>
                </div>

                <div className="bg-white rounded-lg shadow overflow-hidden">
                  <ul className="divide-y">
                    {inventoryDisplayList.length === 0 ? (
                      <li className="p-6 text-center text-gray-400 text-sm">オーパーツデータがありません。</li>
                    ) : (
                      inventoryDisplayList.map((item, idx) => (
                        <li key={item.id || `mat-${idx}`} className={`flex justify-between items-center p-4 hover:bg-gray-50 ${!item.isMaster ? 'bg-red-50' : ''}`}>
                          <span className="font-medium text-sm flex items-center gap-2">
                            {item.name}
                            {!item.isMaster && <span className="text-xs bg-red-200 text-red-700 px-2 py-0.5 rounded-full">手動追加分</span>}
                          </span>
                          <div className="flex items-center gap-2">
                            <input 
                              type="number" min="0" defaultValue={item.count}
                              onBlur={(e) => {
                                const newCount = parseInt(e.target.value, 10);
                                if (!isNaN(newCount) && newCount !== item.count) updateInventory(item.name, newCount);
                              }}
                              className="w-20 border rounded p-1 text-right text-sm"
                            />
                            <span className="text-gray-500 text-sm">個</span>
                            
                            {/* 手動追加された不要なデータ（ネブラ等）を消すためのゴミ箱ボタン */}
                            {!item.isMaster && item.id && (
                              <button onClick={() => deleteInventoryItem(item.id)} className="text-red-400 hover:text-red-600 p-1 ml-2" title="削除">
                                <IconTrash />
                              </button>
                            )}
                          </div>
                        </li>
                      ))
                    )}
                  </ul>
                </div>
                <p className="text-xs text-gray-500 mt-2">※数値を変更して枠外をタップすると自動で保存されます。</p>
              </div>
            )}
          </main>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
