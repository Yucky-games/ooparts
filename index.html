    const firebaseConfig = {
      apiKey: "AIzaSyAlm6ETTvRL1zlTMhAznbqYlh9NXThIZS0",
      authDomain: "ba-materials-app.firebaseapp.com",
      projectId: "ba-materials-app",
      storageBucket: "ba-materials-app.firebasestorage.app",
      messagingSenderId: "488191018366",
      appId: "1:488191018366:web:9bffda0a35b36c0af65f2f",
      measurementId: "G-70TKE1BMCY"
    };

    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();
    const getCollectionPath = (userId, colName) => `users/${userId}/${colName}`;

    // アイコン定義
    const IconChart = () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 3v18h18"/><path d="M18 17V9"/><path d="M13 17V5"/><path d="M8 17v-3"/></svg>;
    const IconUser = () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>;
    const IconPackage = () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m7.5 4.27 9 5.15"/><path d="M21 8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16Z"/><path d="m3.3 7 8.7 5 8.7-5"/><path d="M12 22V12"/></svg>;
    const IconPlus = () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M5 12h14"/><path d="M12 5v14"/></svg>;
    const IconTrash = () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/></svg>;
    const IconRefresh = () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="animate-spin"><path d="M21 12a9 9 0 1 1-9-9c2.52 0 4.93 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/></svg>;
    const IconInfo = () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg>;
    const IconX = () => <span className="inline-flex h-5 w-5 items-center justify-center rounded bg-black text-[11px] font-black text-white leading-none">X</span>;

    const InventoryInput = ({ value, onSave }) => {
      const [localValue, setLocalValue] = useState(value);
      useEffect(() => { setLocalValue(value); }, [value]);
      const handleBlur = () => {
        const val = parseInt(localValue, 10);
        const newCount = isNaN(val) ? 0 : val;
        if (newCount !== value) onSave(newCount);
      };
      return (
        <input 
          type="number" min="0" value={localValue === 0 ? '' : localValue} placeholder="0"
          onChange={(e) => setLocalValue(e.target.value)}
          onBlur={handleBlur}
          className="w-14 border rounded p-1 text-right text-sm focus:border-gray-500 focus:outline-none focus:ring-1 focus:ring-gray-300"
        />
      );
    };

    const normalizeSchaleList = (payload) => {
      if (Array.isArray(payload)) return payload;
      return Object.values(payload || {});
    };

    const readSchaleCache = () => {
      try {
        const cache = JSON.parse(localStorage.getItem(SCHALE_DB_CACHE_KEY));
        if (!cache?.studentsData || !cache?.itemsData || !cache?.cachedAt) return null;
        return {
          ...cache,
          isFresh: Date.now() - cache.cachedAt < SCHALE_DB_CACHE_TTL_MS
        };
      } catch (err) {
        console.warn("Schale DB cache read failed:", err);
        localStorage.removeItem(SCHALE_DB_CACHE_KEY);
        return null;
      }
    };

    const writeSchaleCache = (cache) => {
      try {
        localStorage.setItem(SCHALE_DB_CACHE_KEY, JSON.stringify(cache));
      } catch (err) {
        console.warn("Schale DB cache write failed:", err);
      }
    };

    const getOopartBaseName = (item) => {
      const itemId = Number(item.Id);
      const idGroup = Math.floor(itemId / 10) * 10;
      const gradeOffset = itemId - idGroup;
      if (OOPARTS_ID_BASENAMES[idGroup] && gradeOffset >= 0 && gradeOffset <= 3) {
        return OOPARTS_ID_BASENAMES[idGroup];
      }

      const match = Object.entries(OOPARTS_NAME_ALIASES).find(([_, aliases]) => {
        return aliases.some(alias => item.Name?.includes(alias));
      });
      return match ? match[0] : null;
    };

    const getBdNoteMaterialName = (item) => {
      if (item.Category !== "Material") return null;
      const itemId = Number(item.Id);
      const type = BD_NOTE_TYPES.find(type => itemId >= type.baseId && itemId <= type.baseId + 103);
      if (!type || item.SubCategory !== type.subCategory) return null;

      const relativeId = itemId - type.baseId;
      const schoolIndex = Math.floor(relativeId / 10);
      const gradeIndex = relativeId % 10;
      const school = SCHOOL_ORDER[schoolIndex];
      const grade = GRADES[gradeIndex];
      if (!school || !grade) return null;
      return makeBdNoteName(type, grade, school);
    };

    const getMaterialParts = (matName) => {
      const grade = GRADES.find(g => matName.startsWith(g));
      const baseName = grade ? matName.slice(grade.length) : matName;
      return { grade, baseName };
    };

    const getMaterialOrder = (matName, materialOrder) => {
      const orderIndex = materialOrder.indexOf(matName);
      return orderIndex >= 0 ? orderIndex : materialOrder.length;
    };

    const sortMaterialsByDefaultOrder = (materials, materialOrder) => {
      return [...materials].sort((a, b) => {
        const orderDiff = getMaterialOrder(a.name, materialOrder) - getMaterialOrder(b.name, materialOrder);
        if (orderDiff !== 0) return orderDiff;
        return a.name.localeCompare(b.name, 'ja');
      });
    };

    const getGradeTagClasses = (matName) => {
      const { grade } = getMaterialParts(matName);
      return GRADE_TAG_CLASSES[grade] || "bg-gray-100 text-gray-700 border-gray-200";
    };

    const withAlpha = (hexColor, alphaHex) => `${hexColor}${alphaHex}`;
    const DISPLAY_PREFS_STORAGE_KEY = "ba-display-prefs-v1";
    const DEFAULT_SORT_CONFIG = { key: "default", direction: "asc" };
    const DEFAULT_GRADE_FILTER = { "初級": true, "中級": true, "上級": true, "最上級": true };
    const SORT_KEYS = ["default", "name", "required", "owned", "difference"];
    const SORT_DIRECTIONS = ["asc", "desc"];
    const STUDENT_SORT_MODES = ["name", "created"];
    const STUDENT_ENABLED_FILTERS = ["all", "enabled", "disabled"];

    const readDisplayPrefs = () => {
      try {
        return JSON.parse(localStorage.getItem(DISPLAY_PREFS_STORAGE_KEY)) || {};
      } catch (err) {
        console.warn("Display preferences read failed:", err);
        localStorage.removeItem(DISPLAY_PREFS_STORAGE_KEY);
        return {};
      }
    };

    const normalizeSortConfig = (value) => {
      if (!value || !SORT_KEYS.includes(value.key) || !SORT_DIRECTIONS.includes(value.direction)) {
        return DEFAULT_SORT_CONFIG;
      }
      return { key: value.key, direction: value.direction };
    };

    const normalizeGradeFilter = (value) => {
      return GRADES.reduce((acc, grade) => {
        acc[grade] = typeof value?.[grade] === "boolean" ? value[grade] : DEFAULT_GRADE_FILTER[grade];
        return acc;
      }, {});
    };

    const normalizeOneOf = (value, allowedValues, fallback) => {
      return allowedValues.includes(value) ? value : fallback;
    };

    const normalizeStudentSearchText = (value = "") => {
      return value
        .normalize("NFKC")
        .toLowerCase()
        .replace(/[\u30a1-\u30f6]/g, ch => String.fromCharCode(ch.charCodeAt(0) - 0x60))
        .replace(/[()\[\]{}（）［］｛｝・･\s]/g, "");
    };

    function App() {
      const [user, setUser] = useState(null);
      const [authReady, setAuthReady] = useState(false);
      const [authError, setAuthError] = useState(null);
      const [isAuthBusy, setIsAuthBusy] = useState(false);
      const [xUsername, setXUsername] = useState("");
      const [appMode, setAppMode] = useState('ooparts');
      const [activeTab, setActiveTab] = useState('inventory');
      const [isAboutOpen, setIsAboutOpen] = useState(false);
      const [students, setStudents] = useState([]);
      const [inventory, setInventory] = useState({ items: {}, updatedAt: null });
      const [importText, setImportText] = useState("");
      const [studentSearchText, setStudentSearchText] = useState("");
      const [storedDisplayPrefs] = useState(readDisplayPrefs);
      
      const [sortConfig, setSortConfig] = useState(() => normalizeSortConfig(storedDisplayPrefs.dashboardSort));
      const [gradeFilter, setGradeFilter] = useState(() => normalizeGradeFilter(storedDisplayPrefs.dashboardGradeFilter));
      const [studentSortMode, setStudentSortMode] = useState(() => normalizeOneOf(storedDisplayPrefs.studentSortMode, STUDENT_SORT_MODES, "name"));
      const [studentEnabledFilter, setStudentEnabledFilter] = useState(() => normalizeOneOf(storedDisplayPrefs.studentEnabledFilter, STUDENT_ENABLED_FILTERS, "all"));
      const [hideCompletedStudents, setHideCompletedStudents] = useState(() => storedDisplayPrefs.hideCompletedStudents === true);
      const [expandedStudentIds, setExpandedStudentIds] = useState({});

      const [masterData, setMasterData] = useState(null);
      const [isLoadingDB, setIsLoadingDB] = useState(true);
      const [dbError, setDbError] = useState(null);
      const [selectedNewStudentId, setSelectedNewStudentId] = useState("");
      const currentConfig = APP_CONFIGS[appMode];
      const materialNameSet = new Set(currentConfig.materialOrder);

      useEffect(() => {
        document.title = currentConfig.title;
      }, [currentConfig.title]);

      useEffect(() => {
        try {
          localStorage.setItem(DISPLAY_PREFS_STORAGE_KEY, JSON.stringify({
            dashboardSort: sortConfig,
            dashboardGradeFilter: gradeFilter,
            studentSortMode,
            studentEnabledFilter,
            hideCompletedStudents
          }));
        } catch (err) {
          console.warn("Display preferences write failed:", err);
        }
      }, [sortConfig, gradeFilter, studentSortMode, studentEnabledFilter, hideCompletedStudents]);

      const switchAppMode = (mode) => {
        setAppMode(mode);
        setImportText("");
      };

      const loginWithX = async () => {
        setAuthError(null);
        setIsAuthBusy(true);
        const provider = new firebase.auth.TwitterAuthProvider();
        try {
          const result = await auth.signInWithPopup(provider);
          const username = result?.additionalUserInfo?.username;

            localStorage.setItem(`ba-x-username-${result.user.uid}`, username);
            setXUsername(username);

          console.error("X Login Error:", err);
          const isClosed = err?.code === "auth/popup-closed-by-user" || err?.code === "auth/cancelled-popup-request";
          if (!isClosed) {
            setAuthError("Xログインに失敗しました。Firebaseの認証設定とポップアップ許可をご確認ください。");

          setIsAuthBusy(false);

      const logout = async () => {
        setAuthError(null);
        setIsAuthBusy(true);
        try {
          await auth.signOut();
        } catch (err) {
          console.error("Logout Error:", err);
          setAuthError("ログアウトに失敗しました。時間をおいてもう一度お試しください。");
        } finally {
          setIsAuthBusy(false);
        }
      };

      useEffect(() => {
        const fetchSchaleDB = async () => {
          try {
            let studentsData = null;
            let itemsData = null;
            let lastError = null;
            const cachedData = readSchaleCache();

            if (cachedData?.isFresh) {
              studentsData = cachedData.studentsData;
              itemsData = cachedData.itemsData;
              console.info("Schale DB data loaded from cache.");
            }

            if (!studentsData || !itemsData) {
              for (const source of SCHALE_DB_SOURCES) {
                try {
                  const [studentsRes, itemsRes] = await Promise.all([
                    fetch(`${source.baseUrl}/students.min.json`),
                    fetch(`${source.baseUrl}/items.min.json`)
                  ]);

                  if (!studentsRes.ok || !itemsRes.ok) {
                    throw new Error(`${source.label}: students=${studentsRes.status}, items=${itemsRes.status}`);
                  }

                  const [studentsJson, itemsJson] = await Promise.all([
                    studentsRes.json(),
                    itemsRes.json()
                  ]);

                  studentsData = normalizeSchaleList(studentsJson);
                  itemsData = normalizeSchaleList(itemsJson);
                  writeSchaleCache({
                    sourceLabel: source.label,
                    cachedAt: Date.now(),
                    studentsData,
                    itemsData
                  });
                  break;
                } catch (err) {
                  console.warn("Schale DB source failed:", source.baseUrl, err);
                  lastError = err;
                }
              }
            }

            if (!studentsData || !itemsData) {
              if (cachedData) {
                console.warn("Using expired Schale DB cache because live fetch failed.");
                studentsData = cachedData.studentsData;
                itemsData = cachedData.itemsData;
              } else {
                throw lastError || new Error("Schale DB data source not found.");
              }
            }
            
            const itemDict = {};
            itemsData.forEach(item => {
              const unifiedName = getOopartBaseName(item);
              const grade = GRADE_BY_RARITY[item.Rarity];
              
              // オーパーツは名称揺れを吸収し、BD/ノートは別途ID帯で判定します。
              if (unifiedName && grade && item.Category === "Material" && !item.Name.includes("ノート") && !item.Name.includes("BD") && !item.Name.includes("教育")) {
                itemDict[item.Id] = grade + unifiedName;
              }

              const bdNoteName = getBdNoteMaterialName(item);
              if (bdNoteName) {
                itemDict[item.Id] = bdNoteName;
              }
            });

            const newMaster = {};
            
            studentsData.forEach(s => {
              // 修正点: IsReleased の判定を外し、「スキル素材データが存在する生徒」なら全て許可
              if (!s.SkillExMaterial || s.SkillExMaterial.length === 0) return;
              
              const studentName = s.Name;
              const exRequirements = {};
              const otherRequirements = {};

              s.SkillExMaterial.forEach((reqArray, index) => {
                const targetLevel = index + 2;
                const itemsAtThisLevel = {};
                reqArray.forEach((itemId, i) => {
                  const appItemName = itemDict[itemId];
                  const count = s.SkillExMaterialAmount[index][i];
                  // itemDictに登録されている（＝このアプリで扱う素材である）場合のみ抽出
                  if (appItemName) {
                    itemsAtThisLevel[appItemName] = count;
                  }
                });
                if (Object.keys(itemsAtThisLevel).length > 0) {
                  exRequirements[targetLevel] = itemsAtThisLevel;
                }
              });

              if (s.SkillMaterial) {
                s.SkillMaterial.forEach((reqArray, index) => {
                  const targetLevel = index + 2;
                  const itemsAtThisLevel = {};
                  reqArray.forEach((itemId, i) => {
                    const appItemName = itemDict[itemId];
                    const count = s.SkillMaterialAmount[index][i];
                    // itemDictに登録されている（＝このアプリで扱う素材である）場合のみ抽出
                    if (appItemName) {
                      itemsAtThisLevel[appItemName] = count;
                    }
                  });
                  if (Object.keys(itemsAtThisLevel).length > 0) {
                    otherRequirements[targetLevel] = itemsAtThisLevel;
                  }
                });
              }

              newMaster[s.Id] = {
                id: s.Id,
                name: studentName,
                EX: exRequirements,
                Other: otherRequirements
              };
            });

            setMasterData(newMaster);
            const firstStudent = Object.values(newMaster).sort((a, b) => a.name.localeCompare(b.name, 'ja'))[0];
            if (firstStudent) setSelectedNewStudentId(firstStudent.id);
            
            setIsLoadingDB(false);
          } catch (err) {
            console.error("Schale DB fetch error:", err);
            setDbError("最新のゲームデータの取得に失敗しました。時間をおいて再読み込みしてください。");
            setIsLoadingDB(false);
          }
        };

        fetchSchaleDB();
      }, []);

      useEffect(() => {
        let unsubStudents = null;
        let unsubInventory = null;
        const detachUserDataListeners = () => {
          if (unsubStudents) unsubStudents();
          if (unsubInventory) unsubInventory();
          unsubStudents = null;
          unsubInventory = null;
        };

        const unsubscribeAuth = auth.onAuthStateChanged((currentUser) => {
          detachUserDataListeners();
          const isTwitterUser = currentUser?.providerData?.some(provider => provider.providerId === "twitter.com");

          if (!currentUser || !isTwitterUser) {
            setUser(null);
            setXUsername("");
            setStudents([]);
            setInventory({ items: {}, updatedAt: null });
            setAuthReady(true);
            if (currentUser) {
              auth.signOut().catch(err => console.error("Unsupported auth user signout failed:", err));
            }
            return;
          }

          setUser(currentUser);
          setXUsername(localStorage.getItem(`ba-x-username-${currentUser.uid}`) || "");
          setAuthReady(true);
          unsubStudents = db.collection(getCollectionPath(currentUser.uid, 'students'))
            .onSnapshot(snapshot => {
              setStudents(snapshot.docs.map((doc, index) => ({ id: doc.id, orderIndex: index, ...doc.data() })));
            }, err => {
              console.error("Students snapshot error:", err);
              setDbError("生徒データの同期に失敗しました。Firestoreの権限設定をご確認ください。");
            });
          unsubInventory = db.doc(`${getCollectionPath(currentUser.uid, 'user_data')}/inventory`)
            .onSnapshot(doc => {
              if (doc.exists) setInventory(doc.data());
              else setInventory({ items: {}, updatedAt: null });
            }, err => {
              console.error("Inventory snapshot error:", err);
              setDbError("所持数データの同期に失敗しました。Firestoreの権限設定をご確認ください。");
            });
        });

        return () => {
          detachUserDataListeners();
          unsubscribeAuth();
        };
      }, []);

      const calcRequirements = (student) => {
        const requirements = {};
        const master = masterData[student.studentId] || Object.values(masterData).find(m => m.name === student.name);
        if (!master) return [];

        const cur = student.currentSkills || { EX: 1, NS: 1, PS: 1, SS: 1 };
        const tgt = student.targetSkills || { EX: 1, NS: 1, PS: 1, SS: 1 };

        if (master.EX) {
          for (let lv = cur.EX + 1; lv <= tgt.EX; lv++) {
            if (master.EX[lv]) Object.entries(master.EX[lv]).forEach(([item, count]) => { requirements[item] = (requirements[item] || 0) + count; });
          }
        }
        if (master.Other) {
          ['NS', 'PS', 'SS'].forEach(skill => {
            for (let lv = cur[skill] + 1; lv <= tgt[skill]; lv++) {
              if (master.Other[lv]) Object.entries(master.Other[lv]).forEach(([item, count]) => { requirements[item] = (requirements[item] || 0) + count; });
            }
          });
        }
        return sortMaterialsByDefaultOrder(
          Object.entries(requirements)
            .filter(([name]) => materialNameSet.has(name))
            .map(([name, count]) => ({ name, count })),
          currentConfig.materialOrder
        );
      };

      const addStudent = async () => {
        if (!selectedNewStudentId || !masterData) return;
        const targetMaster = masterData[selectedNewStudentId];
        
        if (students.find(s => s.studentId === selectedNewStudentId || s.name === targetMaster.name)) {
          alert("この生徒は既に登録されています。");
          return;
        }

        const newStudent = {
          studentId: targetMaster.id,
          name: targetMaster.name,
          currentSkills: { EX: 1, NS: 1, PS: 1, SS: 1 },
          targetSkills: { EX: 1, NS: 1, PS: 1, SS: 1 },
          enabled: true,
          completed: false
        };

          setStudents(prev => [
            ...prev,
            {
              ...newStudent,
              id: `local-${Date.now()}-${Math.random().toString(36).slice(2)}`,
              createdAt: Date.now(),
              orderIndex: prev.length
            }
          ]);
          return;
        }
        
        await db.collection(getCollectionPath(user.uid, 'students')).add({

          createdAt: firebase.firestore.FieldValue.serverTimestamp()
        });
      };

      const selectStudentForAdd = (studentId) => {

        setStudentSearchText("");
      };

      const deleteStudent = async (studentId) => {

        if (!user) {
          setStudents(prev => prev.filter(student => student.id !== studentId));

        await db.doc(`${getCollectionPath(user.uid, 'students')}/${studentId}`).delete();
      };

      const toggleStudentEnabled = async (student) => {
        if (!user) {
          setStudents(prev => prev.map(item => (
            item.id === student.id ? { ...item, enabled: student.enabled === false } : item
          )));
          return;
        }
        await db.doc(`${getCollectionPath(user.uid, 'students')}/${student.id}`).update({
          enabled: student.enabled === false
        });

      const toggleStudentCompleted = async (student) => {

          setStudents(prev => prev.map(item => (
            item.id === student.id ? { ...item, completed: student.completed !== true } : item
          )));
          return;
        }
        await db.doc(`${getCollectionPath(user.uid, 'students')}/${student.id}`).update({
          completed: student.completed !== true
        });
      };

      const toggleStudentExpanded = (studentId) => {
        setExpandedStudentIds(prev => ({
          ...prev,
          [studentId]: prev[studentId] !== true
        }));
      };

      const updateSkill = async (student, skillType, isTarget, value) => {
        const curSkills = { ...(student.currentSkills || { EX: 1, NS: 1, PS: 1, SS: 1 }) };
        const tgtSkills = { ...(student.targetSkills || { EX: 1, NS: 1, PS: 1, SS: 1 }) };

        if (isTarget) {
          tgtSkills[skillType] = value;
          if (tgtSkills[skillType] < curSkills[skillType]) curSkills[skillType] = value;
        } else {
          curSkills[skillType] = value;
          if (curSkills[skillType] > tgtSkills[skillType]) tgtSkills[skillType] = value;
        }

        if (!user) {
          setStudents(prev => prev.map(item => (
            item.id === student.id ? { ...item, currentSkills: curSkills, targetSkills: tgtSkills } : item
          )));
          return;
        }

        await db.doc(`${getCollectionPath(user.uid, 'students')}/${student.id}`).update({
          currentSkills: curSkills,
          targetSkills: tgtSkills
        });
      };

      const updateSingleItem = async (matName, count) => {

        newItems[matName] = count;
        const now = new Date().toLocaleString('ja-JP');
        if (!user) {
          setInventory({ items: newItems, updatedAt: now });
          return;
        }
        await db.doc(`${getCollectionPath(user.uid, 'user_data')}/inventory`).set({ items: newItems, updatedAt: now }, { merge: true });
      };

      const handleImport = async () => {
        const text = importText.trim();
        if (!text) return;
        
        const values = text.split(/[\s,]+/).map(v => parseInt(v, 10)).filter(v => !isNaN(v));
        
        if (!currentConfig.csvLengths.includes(values.length)) {
          alert(`データの数が合いません。${currentConfig.csvLengthText}の数値を入力してください。\n（現在認識した数: ${values.length}個）`);
          return;
        }

        const newItems = { ...(inventory.items || {}) };
        let vIndex = 0;

        if (appMode === 'ooparts') {
          OOPARTS_LIST.forEach(oopart => {
            if (values.length === 80) {
              GRADES.forEach(grade => {
                newItems[`${grade}${oopart}`] = values[vIndex++];
              });
            } else if (values.length === 40) {
              newItems[`上級${oopart}`] = values[vIndex++];
              newItems[`最上級${oopart}`] = values[vIndex++];
            }
          });
        } else {
          currentConfig.materialOrder.forEach(matName => {
            newItems[matName] = values[vIndex++];
          });
        }

        const now = new Date().toLocaleString('ja-JP');
        if (user) {
          await db.doc(`${getCollectionPath(user.uid, 'user_data')}/inventory`).set({ items: newItems, updatedAt: now }, { merge: true });
        } else {
          setInventory({ items: newItems, updatedAt: now });
        }
        setImportText("");
        alert("所持数の一括登録が完了しました！");
      };

      const copyImportPrompt = async () => {
        try {
          if (navigator.clipboard?.writeText) {
            await navigator.clipboard.writeText(currentConfig.importPrompt);
          } else {
            const textArea = document.createElement('textarea');
            textArea.value = currentConfig.importPrompt;
            textArea.style.position = 'fixed';
            textArea.style.left = '-9999px';
            document.body.appendChild(textArea);
            let copied = false;
            try {
              textArea.focus();
              textArea.select();
              copied = document.execCommand('copy');
            } finally {
              document.body.removeChild(textArea);
            }
            if (!copied) throw new Error("execCommand copy returned false");
          }
          alert("プロンプトをコピーしました。");
        } catch (err) {
          console.error("Prompt copy failed:", err);
          alert("コピーに失敗しました。ブラウザのクリップボード権限をご確認ください。");
        }
      };

      const handleReset = async () => {
        if (!window.confirm(`本当に${currentConfig.materialLabel}の所持数と更新日時をリセット（0に）しますか？`)) return;
        const newItems = { ...(inventory.items || {}) };
        currentConfig.materialOrder.forEach(matName => {
          delete newItems[matName];
        });
        if (!user) {
          setInventory({ items: newItems, updatedAt: null });
          return;
        }
        await db.doc(`${getCollectionPath(user.uid, 'user_data')}/inventory`).set({ items: newItems, updatedAt: null });
      };

      const requestSort = (key) => {
        let direction = 'asc';
        if (sortConfig && sortConfig.key === key && sortConfig.direction === 'asc') {
          direction = 'desc';
        }
        setSortConfig({ key, direction });
      };

      const getSortIcon = (key) => {
        if (sortConfig.key !== key) return <span className="text-gray-300 text-xs ml-1">↕</span>;
        return sortConfig.direction === 'asc' ? <span style={{ color: currentConfig.theme }} className="text-xs ml-1">▲</span> : <span style={{ color: currentConfig.theme }} className="text-xs ml-1">▼</span>;
      };

      const dashboardData = () => {
        if (!masterData) return [];
        const totals = {};
        students.forEach(student => {
          if (student.enabled === false) return;
          const reqs = calcRequirements(student);
          reqs.forEach(req => {
            if (!totals[req.name]) totals[req.name] = 0;
            totals[req.name] += req.count;
          });
        });
        
        let data = [];
        Object.keys(totals).forEach(matName => {
          const requiredCount = totals[matName];
          const ownedCount = inventory.items?.[matName] || 0;
          data.push({ name: matName, required: requiredCount, owned: ownedCount, difference: ownedCount - requiredCount });
        });
        
        data = data.filter(item => {
          const grade = GRADES.find(g => item.name.startsWith(g));
          return grade ? gradeFilter[grade] : true;
        });

        data.sort((a, b) => {
          if (sortConfig.key === 'default') {
            return getMaterialOrder(a.name, currentConfig.materialOrder) - getMaterialOrder(b.name, currentConfig.materialOrder);
          }
          if (a[sortConfig.key] < b[sortConfig.key]) {
            return sortConfig.direction === 'asc' ? -1 : 1;
          }
          if (a[sortConfig.key] > b[sortConfig.key]) {
            return sortConfig.direction === 'asc' ? 1 : -1;
          }
          return 0;
        });

        return data;
      };
      const themeSoft = withAlpha(currentConfig.theme, "18");
      const themeBorder = withAlpha(currentConfig.theme, "55");

      if (dbError) {
        return <div className="flex flex-col h-screen items-center justify-center bg-red-50 text-red-600 p-4 text-center">
          <p className="font-bold mb-2">通信エラー</p>
          <p className="text-sm">{dbError}</p>
        </div>;
      }

      if (!authReady || isLoadingDB) {
        return <div style={{ backgroundColor: themeSoft, color: currentConfig.theme }} className="flex flex-col h-screen items-center justify-center gap-3">
          <IconRefresh />
          <p className="text-sm font-bold animate-pulse">最新のゲームデータを取得中...</p>
        </div>;
      }

      const studentDropdownList = Object.values(masterData).sort((a, b) => a.name.localeCompare(b.name, 'ja'));
      const normalizedStudentQuery = normalizeStudentSearchText(studentSearchText);
      const registeredStudentKeys = new Set(students.flatMap(student => [
        String(student.studentId || ""),
        student.name || ""
      ]));
      const studentSearchResults = normalizedStudentQuery
        ? studentDropdownList
          .filter(student => normalizeStudentSearchText(student.name).includes(normalizedStudentQuery))
          .slice(0, 12)
        : [];
      const isStudentRegisteredForAdd = (student) => {
        return registeredStudentKeys.has(String(student.id)) || registeredStudentKeys.has(student.name);
      };
      const firstSelectableStudentResult = studentSearchResults.find(student => !isStudentRegisteredForAdd(student));
      const getCreatedAtMillis = (student) => {
        if (student.createdAt?.toMillis) return student.createdAt.toMillis();
        if (typeof student.createdAt === 'number') return student.createdAt;
        return null;
      };
      const filteredStudents = students.filter(student => {
        const studentEnabled = student.enabled !== false;
        const studentCompleted = student.completed === true;
        if (hideCompletedStudents && studentCompleted) return false;
        if (studentEnabledFilter === 'enabled' && !studentEnabled) return false;
        if (studentEnabledFilter === 'disabled' && studentEnabled) return false;
        return true;
      });
      const sortedStudents = [...filteredStudents].sort((a, b) => {
        if (studentSortMode === 'created') {
          const aTime = getCreatedAtMillis(a);
          const bTime = getCreatedAtMillis(b);
          if (aTime !== null && bTime !== null && aTime !== bTime) return aTime - bTime;
          if (aTime !== null && bTime === null) return 1;
          if (aTime === null && bTime !== null) return -1;
          return (a.orderIndex || 0) - (b.orderIndex || 0);
        }
        return (a.name || '').localeCompare(b.name || '', 'ja');
      });
      const dashboardRows = dashboardData();
      const twitterProfile = user?.providerData?.find(provider => provider.providerId === "twitter.com");
      const userDisplayName = xUsername ? `@${xUsername}` : (user?.displayName || twitterProfile?.displayName || "Xユーザー");
      const userPhotoUrl = user?.photoURL || twitterProfile?.photoURL;
      const getTabStyle = (tabName) => activeTab === tabName ? {
        borderColor: currentConfig.theme,
        color: currentConfig.theme
      } : {};
      const getSoftActiveStyle = (isActive) => isActive ? {
        backgroundColor: themeSoft,
        borderColor: themeBorder,
        color: currentConfig.theme
      } : {};

      return (
        <div className="flex flex-col h-screen text-gray-800 font-sans">
          <header style={{ backgroundColor: currentConfig.theme }} className="text-white p-4 shadow-md flex justify-between items-center">
            <div className="flex flex-wrap items-center gap-2">
              <h1 className="text-xl font-bold">{currentConfig.title}</h1>
              <button
                type="button"
                onClick={() => switchAppMode(currentConfig.switchMode)}
                className="text-xs font-bold bg-white/20 hover:bg-white/30 border border-white/40 px-2 py-1 rounded transition-colors"
              >
                {currentConfig.switchLabel}
              </button>
            </div>
            <div className="flex flex-col items-end gap-1 text-right">
              {user ? (
                <div className="flex flex-wrap items-center justify-end gap-2 text-xs">
                  {userPhotoUrl ? (
                    <img
                      src={userPhotoUrl}
                      alt={userDisplayName}
                      referrerPolicy="no-referrer"
                      className="h-6 w-6 rounded-full border border-white/50 bg-white object-cover"
                    />
                  ) : (
                    <span className="inline-flex h-6 w-6 items-center justify-center rounded-full border border-white/50 bg-white/20 text-[10px] font-bold">
                      {userDisplayName.slice(0, 1)}
                    </span>
                  )}
                  <span className="max-w-[160px] truncate font-bold">{userDisplayName}</span>
                  <button

                  >

                    ログインしていないため、入力内容は再読み込みで初期化されます。
                  </p>

              )}
              {authError && (
                <p className="max-w-[240px] rounded bg-white/90 px-2 py-1 text-[10px] font-bold leading-snug text-red-600">
                  {authError}

            </div>

          <div className="flex bg-white shadow-sm border-b">

              <IconPackage /> 所持数

            {activeTab === 'dashboard' && (

              <button
                type="button"
                onClick={() => setIsAboutOpen(true)}
                style={{ color: currentConfig.theme }}

      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
