      useEffect(() => { setLocalValue(value); }, [value]);
      const handleBlur = () => {

        const newCount = isNaN(val) ? 0 : val;
        if (newCount !== value) onSave(newCount);

      return (

    const calcRequirements = (student) => {
      const requirements = {};
      const master = STUDENT_MASTER[student.name];
      if (!master) return [];
      const cur = student.currentSkills || { EX: 1, NS: 1, PS: 1, SS: 1 };
      const tgt = student.targetSkills || { EX: 1, NS: 1, PS: 1, SS: 1 };

      if (master.EX) {
        for (let lv = cur.EX + 1; lv <= tgt.EX; lv++) {
          if (master.EX[lv]) Object.entries(master.EX[lv]).forEach(([item, count]) => { requirements[item] = (requirements[item] || 0) + count; });
        }
      }
      if (master.Other) {
        ['NS', 'PS', 'SS'].forEach(skill => {
          for (let lv = cur[skill] + 1; lv <= tgt[skill]; lv++) {
            if (master.Other[lv]) Object.entries(master.Other[lv]).forEach(([item, count]) => { requirements[item] = (requirements[item] || 0) + count; });
          }
        });
      }
      return Object.entries(requirements).map(([name, count]) => ({ name, count }));
    };

                setStudents(snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() })));
              });
            // 単一ドキュメントでの所持数管理に変更
            const unsubInventory = db.doc(`${getCollectionPath(currentUser.uid, 'user_data')}/inventory`)

                if (doc.exists) setInventory(doc.data());
                else setInventory({ items: {}, updatedAt: null });

            return () => { unsubStudents(); unsubInventory(); };

      const addStudent = async () => { /* 略 */ };

        if (!user) return;

        newItems[matName] = count;
        const now = new Date().toLocaleString('ja-JP');
        await db.doc(`${getCollectionPath(user.uid, 'user_data')}/inventory`).set({ items: newItems, updatedAt: now }, { merge: true });
      };

      const handleImport = async () => {
        if (!user) return;
        const text = importText.trim();
        if (!text) return;
        
        // カンマやスペースで区切られた数字を配列にする
        const values = text.split(/[\s,]+/).map(v => parseInt(v, 10)).filter(v => !isNaN(v));
        
        // エラーチェック (80個 または 上・最上のみの40個)
        if (values.length !== 80 && values.length !== 40) {
          alert(`データの数が合いません。80個（全グレード）または40個（上級・最上級のみ）の数値を入力してください。\n（現在認識した数: ${values.length}個）`);
          return;
        }

        const newItems = { ...(inventory.items || {}) };
        let vIndex = 0;

        OOPARTS_LIST.forEach(oopart => {
          if (values.length === 80) {
            GRADES.forEach(grade => {
              newItems[`${grade}${oopart}`] = values[vIndex++];
            });
          } else if (values.length === 40) {
            newItems[`上級${oopart}`] = values[vIndex++];
            newItems[`最上級${oopart}`] = values[vIndex++];
          }
        });

        await db.doc(`${getCollectionPath(user.uid, 'user_data')}/inventory`).set({ items: newItems, updatedAt: now }, { merge: true });
        setImportText("");
        alert("所持数の一括登録が完了しました！");
      };

        if (!user || !window.confirm("本当にすべての所持数と更新日時をリセット（0に）しますか？")) return;

        Object.keys(totals).forEach(matName => {

          const grade = GRADES.find(g => item.name.startsWith(g));
          return grade ? gradeFilter[grade] : true;
        });

        data.sort((a, b) => {
          if (a[sortConfig.key] < b[sortConfig.key]) {
            return sortConfig.direction === 'asc' ? -1 : 1;
          }
          if (a[sortConfig.key] > b[sortConfig.key]) {
            return sortConfig.direction === 'asc' ? 1 : -1;
          }
          return 0;
        });

            <div className="text-sm opacity-80">ID: {user.uid.substring(0, 5)}</div>
          </header>

          <div className="flex bg-white shadow-sm border-b">
            <button onClick={() => setActiveTab('dashboard')} className={`flex-1 p-3 flex justify-center items-center gap-2 border-b-2 ${activeTab === 'dashboard' ? 'border-blue-600 text-blue-600 font-bold' : 'border-transparent text-gray-500'}`}>
              <IconChart /> 不足確認
            </button>
            <button onClick={() => setActiveTab('students')} className={`flex-1 p-3 flex justify-center items-center gap-2 border-b-2 ${activeTab === 'students' ? 'border-blue-600 text-blue-600 font-bold' : 'border-transparent text-gray-500'}`}>
              <IconUser /> 育成目標
            </button>
            <button onClick={() => setActiveTab('inventory')} className={`flex-1 p-3 flex justify-center items-center gap-2 border-b-2 ${activeTab === 'inventory' ? 'border-blue-600 text-blue-600 font-bold' : 'border-transparent text-gray-500'}`}>
              <IconPackage /> 所持数
            </button>
          </div>

          <main className="flex-1 overflow-y-auto p-4 max-w-3xl mx-auto w-full">
            
            {/* === 不足確認タブ === */}
            {activeTab === 'dashboard' && (
              <div className="pb-8">
                <h2 className="text-lg font-bold mb-4 text-gray-700">必要オーパーツ集計</h2>

                {/* ===== 追加: フィルタチェックボックス ===== */}
                <div className="bg-white p-4 rounded-lg shadow mb-4">
                  <div className="text-sm font-bold text-gray-700 mb-2">表示する素材グレード</div>
                  <div className="flex flex-wrap gap-4">
                    {GRADES.map(grade => (
                      <label key={grade} className="flex items-center gap-1 cursor-pointer select-none">
                        <input 
                          type="checkbox" 
                          checked={gradeFilter[grade]} 
                          onChange={(e) => setGradeFilter({...gradeFilter, [grade]: e.target.checked})}
                          className="w-4 h-4 text-blue-600 rounded border-gray-300 focus:ring-blue-500"
                        />
                        <span className="text-sm">{grade}</span>
                      </label>
                    ))}
                  </div>
                </div>
                {/* ======================================== */}

                <div className="bg-white rounded-lg shadow overflow-hidden">
                  <table className="w-full text-left border-collapse">
                    <thead>
                      <tr className="bg-gray-100 text-gray-600 text-sm select-none">
                        <th className="p-3 border-b cursor-pointer hover:bg-gray-200 transition-colors" onClick={() => requestSort('name')}>
                          オーパーツ名 {getSortIcon('name')}
                        </th>
                        <th className="p-3 border-b text-right cursor-pointer hover:bg-gray-200 transition-colors" onClick={() => requestSort('required')}>
                          必要 {getSortIcon('required')}
                        </th>
                        <th className="p-3 border-b text-right cursor-pointer hover:bg-gray-200 transition-colors" onClick={() => requestSort('owned')}>
                          所持 {getSortIcon('owned')}
                        </th>
                        <th className="p-3 border-b text-right cursor-pointer hover:bg-gray-200 transition-colors" onClick={() => requestSort('difference')}>
                          差分 {getSortIcon('difference')}
                        </th>
                      </tr>
                    </thead>
                    <tbody>
                      {dashboardData().length === 0 ? (
                        <tr><td colSpan="4" className="p-6 text-center text-gray-400">条件に一致するデータがありません。</td></tr>
                      ) : (
                        dashboardData().map((item, idx) => (
                          <tr key={idx} className="border-b hover:bg-gray-50 text-sm">
                            <td className="p-3 font-medium">{item.name}</td>
                            <td className="p-3 text-right">{item.required}</td>
                            <td className="p-3 text-right text-blue-600 font-semibold">{item.owned}</td>
                            <td className={`p-3 text-right font-bold ${item.difference < 0 ? 'text-red-500' : 'text-green-500'}`}>
                              {item.difference < 0 ? item.difference : `+${item.difference}`}
                            </td>
                          </tr>
                        ))
                      )}
                    </tbody>
                  </table>
                </div>
              </div>
            )}

            {/* === 所持数（インベントリ）タブ === */}
            {activeTab === 'inventory' && (
              <div className="pb-8">
                <div className="flex justify-between items-end mb-4">
                  <h2 className="text-lg font-bold text-gray-700">所持数入力・CSVインポート</h2>
                  {inventory.updatedAt && (
                    <span className="text-xs text-gray-500 font-medium bg-gray-200 px-2 py-1 rounded">
                      最終更新: {inventory.updatedAt}
                    </span>
                  )}
                </div>

                {/* 一括インポートエリア */}
                <div className="bg-white p-4 rounded-lg shadow mb-6 border-t-4 border-blue-500">
                  <div className="flex justify-between items-center mb-2">
                    <h3 className="text-sm font-bold text-gray-700">AIからのCSVを貼り付け</h3>
                    <button onClick={handleReset} className="text-red-500 hover:text-red-700 text-xs flex items-center gap-1 font-bold bg-red-50 px-2 py-1 rounded">
                      <IconTrash /> 全リセット
                    </button>
                  </div>
                  <textarea
                    className="w-full border border-gray-300 rounded p-2 text-sm bg-gray-50 h-20 mb-3 focus:ring-2 focus:ring-blue-400 focus:outline-none"
                    placeholder="例: 10, 5, 2, 0, 15, 10... (80個の数字)"
                    value={importText}
                    onChange={(e) => setImportText(e.target.value)}
                  ></textarea>
                  <button onClick={handleImport} className="bg-gray-800 hover:bg-gray-900 text-white font-bold py-2 px-4 rounded text-sm w-full shadow">
                    CSVから一括登録する
                  </button>
                </div>

                {/* マトリックス入力エリア */}
                <div className="bg-white rounded-lg shadow overflow-x-auto">
                  <table className="w-full text-left border-collapse min-w-[400px]">
                    <thead>
                      <tr className="bg-gray-100 text-gray-600 text-xs text-center border-b-2">
                        <th className="p-2 border-r sticky left-0 bg-gray-100 shadow-[1px_0_0_0_#e5e7eb] z-10 text-left">オーパーツ名</th>
                        {GRADES.map(g => <th key={g} className="p-2 w-16">{g}</th>)}
                      </tr>
                    </thead>
                    <tbody>
                      {OOPARTS_LIST.map((oopart, idx) => (
                        <tr key={oopart} className={`border-b hover:bg-blue-50 transition-colors ${idx % 2 === 0 ? 'bg-white' : 'bg-gray-50'}`}>
                          <td className="p-2 font-medium text-xs sticky left-0 bg-inherit border-r shadow-[1px_0_0_0_#e5e7eb] z-10">
                            {oopart}
                          </td>
                          {GRADES.map(grade => {
                            const matName = `${grade}${oopart}`;
                            const count = inventory.items?.[matName] || 0;
                            return (
                              <td key={grade} className="p-1 text-center">
                                <InventoryInput 
                                  value={count} 
                                  onSave={(val) => updateSingleItem(matName, val)} 
                                />
                              </td>
                            );
                          })}
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
                <p className="text-xs text-gray-500 mt-3 text-center">※数値を変更して枠外をタップすると自動で保存されます。</p>
              </div>
            )}
            
            {/* === 育成目標タブ === */}
            {activeTab === 'students' && (
              <div>
                <div className="bg-white p-4 rounded-lg shadow mb-6 flex gap-2">
                  <select 
                    value={selectedNewStudent} 
                    onChange={(e) => setSelectedNewStudent(e.target.value)}
                    className="border rounded p-2 flex-1 text-sm bg-gray-50"
                  >
                    {studentNameList.map(name => <option key={name} value={name}>{name}</option>)}
                  </select>
                  <button onClick={addStudent} className="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg flex items-center gap-1 text-sm">
                    <IconPlus /> 追加
                  </button>
                </div>

                <div className="space-y-4">
                  {students.map(student => {
                    const curSkills = student.currentSkills || { EX: 1, NS: 1, PS: 1, SS: 1 };
                    const tgtSkills = student.targetSkills || { EX: 1, NS: 1, PS: 1, SS: 1 };
                    const reqMats = calcRequirements(student);

                    return (
                      <div key={student.id} className="bg-white p-4 rounded-lg shadow border border-gray-100">
                        <div className="flex justify-between items-center mb-3 border-b pb-2">
                          <h3 className="font-bold text-lg text-blue-900">{student.name}</h3>
                          <button onClick={() => deleteStudent(student.id)} className="text-red-400 hover:text-red-600 p-1"><IconTrash /></button>
                        </div>
                        
                        {/* 修正箇所: スキル入力をコンパクトな1列横並びに変更 */}
                        <div className="flex flex-wrap justify-between gap-y-3 bg-gray-50 p-3 rounded">
                          {['EX', 'NS', 'PS', 'SS'].map(skill => {
                            const isEX = skill === 'EX';
                            const maxLv = isEX ? 5 : 10;
                            return (
                              <div key={skill} className="flex flex-col items-center">
                                <span className="font-bold text-gray-700 text-sm mb-1">{skill}</span>
                                <div className="flex items-end gap-1">
                                  {/* 現状レベル */}
                                  <div className="flex flex-col items-center">
                                    <span className="text-[10px] text-gray-500 mb-0.5">現状</span>
                                    <select 
                                      value={curSkills[skill]} 
                                      onChange={(e) => updateSkill(student, skill, false, parseInt(e.target.value))} 
                                      className="border border-gray-300 rounded px-1 py-1 text-sm bg-white text-center w-12 focus:ring-1 focus:ring-blue-500 focus:outline-none"
                                    >
                                      {[...Array(maxLv)].map((_, i) => <option key={i+1} value={i+1}>{i+1}</option>)}
                                    </select>
                                  </div>
                                  
                                  <span className="text-gray-300 mb-1.5 text-xs">→</span>
                                  
                                  {/* 目標レベル */}
                                  <div className="flex flex-col items-center">
                                    <span className="text-[10px] text-blue-600 font-medium mb-0.5">目標</span>
                                    <select 
                                      value={tgtSkills[skill]} 
                                      onChange={(e) => updateSkill(student, skill, true, parseInt(e.target.value))} 
                                      className="border border-blue-300 rounded px-1 py-1 text-sm bg-blue-50 font-bold text-blue-700 text-center w-12 focus:ring-1 focus:ring-blue-500 focus:outline-none"
                                    >
                                      {[...Array(maxLv)].map((_, i) => <option key={i+1} value={i+1}>{i+1}</option>)}
                                    </select>
                                  </div>
                                </div>
                              </div>
                            );
                          })}
                        </div>

                        <div className="mt-4 pt-3 border-t">
                          <div className="text-xs text-gray-500 mb-2">目標達成に必要な素材</div>
                          {reqMats.length === 0 ? (
                            <div className="text-sm text-gray-400">必要な素材はありません</div>
                          ) : (
                            <div className="flex flex-wrap gap-2">
                              {reqMats.map(req => (
                                <span key={req.name} className="bg-blue-50 text-blue-800 border border-blue-200 text-xs px-2 py-1 rounded-full font-medium">
                                  {req.name}: {req.count}
                                </span>
                              ))}
                            </div>
                          )}
                        </div>
                      </div>
                    )
                  })}
                </div>
              </div>
            )}
            
          </main>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
