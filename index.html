<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ブルアカ オーパーツ管理</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone@7.23.10/babel.min.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>
</head>
<body class="bg-gray-100">
  <div id="root"></div>

  <script type="text/babel" data-presets="react,env">
    const { useState, useEffect } = React;

    const SCHALE_DB_SOURCES = [
      { label: "Schale DB", baseUrl: "https://schaledb.com/data/jp" },
      { label: "Schale DB Legacy", baseUrl: "https://raw.githubusercontent.com/SchaleDB/SchaleDB/main/data/jp" }
    ];
    const SCHALE_DB_CACHE_KEY = "ba-ooparts-schaledb-cache-v1";
    const SCHALE_DB_CACHE_TTL_MS = 24 * 60 * 60 * 1000;

    // SchaleDBのオーパーツID帯を、アプリで表示する統一名に対応させます。
    // 名称の表記揺れよりIDの方が安定するため、まずIDで判定します。
    const OOPARTS_ID_BASENAMES = {
      100: "ネブラディスク",
      110: "ファイストス円盤",
      120: "ヴォルフスエック鉄鋼",
      130: "ニムルドレンズ",
      140: "マンドレイク",
      150: "レヒニッツ写本",
      160: "エーテル",
      170: "アンティキティラ装置",
      180: "ヴォイニッチ手稿",
      190: "水晶埴輪",
      200: "トーテムポール",
      210: "古代の電池",
      220: "黄金の糸",
      230: "髪伸び人形",
      240: "円盤型ペンダント",
      250: "古代文明のメダル",
      260: "中空十二面体",
      270: "黄金シャトル",
      280: "古代ロケット",
      290: "ミステリーストーン"
    };

    // IDが取れない/将来形式が変わった場合の補助的な名称判定。
    const OOPARTS_NAME_ALIASES = {
      "ネブラディスク": ["ネブラディスク"],
      "ファイストス円盤": ["ファイストス円盤"],
      "ヴォルフスエック鉄鋼": ["ヴォルフスエック"],
      "ニムルドレンズ": ["ニムルドレンズ"],
      "マンドレイク": ["マンドレイク"],
      "レヒニッツ写本": ["レヒニッツ写本"],
      "エーテル": ["エーテル"],
      "アンティキティラ装置": ["アンティキティラ装置"],
      "ヴォイニッチ手稿": ["ヴォイニッチ手稿"],
      "水晶埴輪": ["水晶埴輪"],
      "トーテムポール": ["トーテムポール"],
      "古代の電池": ["古代の電池"],
      "黄金の糸": ["黄金の糸", "黄金の巻糸", "黄金の布"],
      "髪伸び人形": ["髪伸び人形"],
      "円盤型ペンダント": ["円盤型ペンダント"],
      "古代文明のメダル": ["古代文明のメダル"],
      "中空十二面体": ["中空十二面体"],
      "黄金シャトル": ["黄金シャトル"],
      "古代ロケット": ["古代ロケット"],
      "ミステリーストーン": ["ミステリーストーン"]
    };

    // アプリ内で表示に使う20種のリスト（並び順用）
    const OOPARTS_LIST = [
      "ネブラディスク", "ファイストス円盤", "ヴォルフスエック鉄鋼", "ニムルドレンズ", 
      "マンドレイク", "レヒニッツ写本", "エーテル", "アンティキティラ装置", 
      "ヴォイニッチ手稿", "水晶埴輪", "トーテムポール", "古代の電池", 
      "黄金の糸", "髪伸び人形", "円盤型ペンダント", "古代文明のメダル", 
      "中空十二面体", "黄金シャトル", "古代ロケット", "ミステリーストーン"
    ];
    
    const GRADES = ["初級", "中級", "上級", "最上級"];
    const GRADE_BY_RARITY = { N: "初級", R: "中級", SR: "上級", SSR: "最上級" };
    const GRADE_TAG_CLASSES = {
      "初級": "bg-sky-50 text-sky-900 border-sky-200",
      "中級": "bg-cyan-100 text-cyan-950 border-cyan-300",
      "上級": "bg-yellow-100 text-yellow-950 border-yellow-300",
      "最上級": "bg-purple-100 text-purple-950 border-purple-300"
    };

    const firebaseConfig = {
      apiKey: "AIzaSyAlm6ETTvRL1zlTMhAznbqYlh9NXThIZS0",
      authDomain: "ba-materials-app.firebaseapp.com",
      projectId: "ba-materials-app",
      storageBucket: "ba-materials-app.firebasestorage.app",
      messagingSenderId: "488191018366",
      appId: "1:488191018366:web:9bffda0a35b36c0af65f2f"
    };

    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();
    const getCollectionPath = (userId, colName) => `users/${userId}/${colName}`;

    // アイコン定義
    const IconChart = () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 3v18h18"/><path d="M18 17V9"/><path d="M13 17V5"/><path d="M8 17v-3"/></svg>;
    const IconUser = () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>;
    const IconPackage = () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m7.5 4.27 9 5.15"/><path d="M21 8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16Z"/><path d="m3.3 7 8.7 5 8.7-5"/><path d="M12 22V12"/></svg>;
    const IconPlus = () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M5 12h14"/><path d="M12 5v14"/></svg>;
    const IconTrash = () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/></svg>;
    const IconRefresh = () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="animate-spin"><path d="M21 12a9 9 0 1 1-9-9c2.52 0 4.93 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/></svg>;

    const InventoryInput = ({ value, onSave }) => {
      const [localValue, setLocalValue] = useState(value);
      useEffect(() => { setLocalValue(value); }, [value]);
      const handleBlur = () => {
        const val = parseInt(localValue, 10);
        const newCount = isNaN(val) ? 0 : val;
        if (newCount !== value) onSave(newCount);
      };
      return (
        <input 
          type="number" min="0" value={localValue === 0 ? '' : localValue} placeholder="0"
          onChange={(e) => setLocalValue(e.target.value)}
          onBlur={handleBlur}
          className="w-14 border rounded p-1 text-right text-sm focus:border-blue-500 focus:outline-none focus:ring-1 focus:ring-blue-500"
        />
      );
    };

    const normalizeSchaleList = (payload) => {
      if (Array.isArray(payload)) return payload;
      return Object.values(payload || {});
    };

    const readSchaleCache = () => {
      try {
        const cache = JSON.parse(localStorage.getItem(SCHALE_DB_CACHE_KEY));
        if (!cache?.studentsData || !cache?.itemsData || !cache?.cachedAt) return null;
        return {
          ...cache,
          isFresh: Date.now() - cache.cachedAt < SCHALE_DB_CACHE_TTL_MS
        };
      } catch (err) {
        console.warn("Schale DB cache read failed:", err);
        localStorage.removeItem(SCHALE_DB_CACHE_KEY);
        return null;
      }
    };

    const writeSchaleCache = (cache) => {
      try {
        localStorage.setItem(SCHALE_DB_CACHE_KEY, JSON.stringify(cache));
      } catch (err) {
        console.warn("Schale DB cache write failed:", err);
      }
    };

    const getOopartBaseName = (item) => {
      const itemId = Number(item.Id);
      const idGroup = Math.floor(itemId / 10) * 10;
      const gradeOffset = itemId - idGroup;
      if (OOPARTS_ID_BASENAMES[idGroup] && gradeOffset >= 0 && gradeOffset <= 3) {
        return OOPARTS_ID_BASENAMES[idGroup];
      }

      const match = Object.entries(OOPARTS_NAME_ALIASES).find(([_, aliases]) => {
        return aliases.some(alias => item.Name?.includes(alias));
      });
      return match ? match[0] : null;
    };

    const getMaterialParts = (matName) => {
      const grade = GRADES.find(g => matName.startsWith(g));
      const baseName = grade ? matName.slice(grade.length) : matName;
      return { grade, baseName };
    };

    const getMaterialOrder = (matName) => {
      const { grade, baseName } = getMaterialParts(matName);
      const baseIndex = OOPARTS_LIST.indexOf(baseName);
      const gradeIndex = GRADES.indexOf(grade);
      const normalizedBaseIndex = baseIndex >= 0 ? baseIndex : OOPARTS_LIST.length;
      const normalizedGradeIndex = gradeIndex >= 0 ? gradeIndex : GRADES.length;
      return normalizedBaseIndex * GRADES.length + normalizedGradeIndex;
    };

    const sortMaterialsByDefaultOrder = (materials) => {
      return [...materials].sort((a, b) => {
        const orderDiff = getMaterialOrder(a.name) - getMaterialOrder(b.name);
        if (orderDiff !== 0) return orderDiff;
        return a.name.localeCompare(b.name, 'ja');
      });
    };

    const getGradeTagClasses = (matName) => {
      const { grade } = getMaterialParts(matName);
      return GRADE_TAG_CLASSES[grade] || "bg-gray-100 text-gray-700 border-gray-200";
    };

    function App() {
      const [user, setUser] = useState(null);
      const [activeTab, setActiveTab] = useState('inventory');
      const [students, setStudents] = useState([]);
      const [inventory, setInventory] = useState({ items: {}, updatedAt: null });
      const [importText, setImportText] = useState("");
      
      const [sortConfig, setSortConfig] = useState({ key: 'default', direction: 'asc' });
      const [gradeFilter, setGradeFilter] = useState({ '初級': true, '中級': true, '上級': true, '最上級': true });
      const [studentSortMode, setStudentSortMode] = useState('name');
      const [studentEnabledFilter, setStudentEnabledFilter] = useState('all');
      const [hideCompletedStudents, setHideCompletedStudents] = useState(false);
      const [expandedStudentIds, setExpandedStudentIds] = useState({});

      const [masterData, setMasterData] = useState(null);
      const [isLoadingDB, setIsLoadingDB] = useState(true);
      const [dbError, setDbError] = useState(null);
      const [selectedNewStudentId, setSelectedNewStudentId] = useState("");

      useEffect(() => {
        const fetchSchaleDB = async () => {
          try {
            let studentsData = null;
            let itemsData = null;
            let lastError = null;
            const cachedData = readSchaleCache();

            if (cachedData?.isFresh) {
              studentsData = cachedData.studentsData;
              itemsData = cachedData.itemsData;
              console.info("Schale DB data loaded from cache.");
            }

            if (!studentsData || !itemsData) {
              for (const source of SCHALE_DB_SOURCES) {
                try {
                  const [studentsRes, itemsRes] = await Promise.all([
                    fetch(`${source.baseUrl}/students.min.json`),
                    fetch(`${source.baseUrl}/items.min.json`)
                  ]);

                  if (!studentsRes.ok || !itemsRes.ok) {
                    throw new Error(`${source.label}: students=${studentsRes.status}, items=${itemsRes.status}`);
                  }

                  const [studentsJson, itemsJson] = await Promise.all([
                    studentsRes.json(),
                    itemsRes.json()
                  ]);

                  studentsData = normalizeSchaleList(studentsJson);
                  itemsData = normalizeSchaleList(itemsJson);
                  writeSchaleCache({
                    sourceLabel: source.label,
                    cachedAt: Date.now(),
                    studentsData,
                    itemsData
                  });
                  break;
                } catch (err) {
                  console.warn("Schale DB source failed:", source.baseUrl, err);
                  lastError = err;
                }
              }
            }

            if (!studentsData || !itemsData) {
              if (cachedData) {
                console.warn("Using expired Schale DB cache because live fetch failed.");
                studentsData = cachedData.studentsData;
                itemsData = cachedData.itemsData;
              } else {
                throw lastError || new Error("Schale DB data source not found.");
              }
            }
            
            const itemDict = {};
            itemsData.forEach(item => {
              const unifiedName = getOopartBaseName(item);
              const grade = GRADE_BY_RARITY[item.Rarity];
              
              // ノートやBDを除外し、オーパーツのみを抽出
              if (unifiedName && grade && item.Category === "Material" && !item.Name.includes("ノート") && !item.Name.includes("BD") && !item.Name.includes("教育")) {
                itemDict[item.Id] = grade + unifiedName;
              }
            });

            const newMaster = {};
            
            studentsData.forEach(s => {
              // 修正点: IsReleased の判定を外し、「スキル素材データが存在する生徒」なら全て許可
              if (!s.SkillExMaterial || s.SkillExMaterial.length === 0) return;
              
              const studentName = s.Name;
              const exRequirements = {};
              const otherRequirements = {};

              s.SkillExMaterial.forEach((reqArray, index) => {
                const targetLevel = index + 2;
                const itemsAtThisLevel = {};
                reqArray.forEach((itemId, i) => {
                  const appItemName = itemDict[itemId];
                  const count = s.SkillExMaterialAmount[index][i];
                  // itemDictに登録されている（＝オーパーツである）場合のみ抽出
                  if (appItemName) {
                    itemsAtThisLevel[appItemName] = count;
                  }
                });
                if (Object.keys(itemsAtThisLevel).length > 0) {
                  exRequirements[targetLevel] = itemsAtThisLevel;
                }
              });

              if (s.SkillMaterial) {
                s.SkillMaterial.forEach((reqArray, index) => {
                  const targetLevel = index + 2;
                  const itemsAtThisLevel = {};
                  reqArray.forEach((itemId, i) => {
                    const appItemName = itemDict[itemId];
                    const count = s.SkillMaterialAmount[index][i];
                    // itemDictに登録されている（＝オーパーツである）場合のみ抽出
                    if (appItemName) {
                      itemsAtThisLevel[appItemName] = count;
                    }
                  });
                  if (Object.keys(itemsAtThisLevel).length > 0) {
                    otherRequirements[targetLevel] = itemsAtThisLevel;
                  }
                });
              }

              newMaster[s.Id] = {
                id: s.Id,
                name: studentName,
                EX: exRequirements,
                Other: otherRequirements
              };
            });

            setMasterData(newMaster);
            const firstStudent = Object.values(newMaster).sort((a, b) => a.name.localeCompare(b.name, 'ja'))[0];
            if (firstStudent) setSelectedNewStudentId(firstStudent.id);
            
            setIsLoadingDB(false);
          } catch (err) {
            console.error("Schale DB fetch error:", err);
            setDbError("最新のゲームデータの取得に失敗しました。時間をおいて再読み込みしてください。");
            setIsLoadingDB(false);
          }
        };

        fetchSchaleDB();
      }, []);

      useEffect(() => {
        auth.signInAnonymously().catch(err => console.error("Login Error:", err));
        const unsubscribeAuth = auth.onAuthStateChanged((currentUser) => {
          setUser(currentUser);
          if (currentUser) {
            const unsubStudents = db.collection(getCollectionPath(currentUser.uid, 'students'))
              .onSnapshot(snapshot => {
                setStudents(snapshot.docs.map((doc, index) => ({ id: doc.id, orderIndex: index, ...doc.data() })));
              });
            const unsubInventory = db.doc(`${getCollectionPath(currentUser.uid, 'user_data')}/inventory`)
              .onSnapshot(doc => {
                if (doc.exists) setInventory(doc.data());
                else setInventory({ items: {}, updatedAt: null });
              });
            return () => { unsubStudents(); unsubInventory(); };
          }
        });
        return () => unsubscribeAuth();
      }, []);

      const calcRequirements = (student) => {
        const requirements = {};
        const master = masterData[student.studentId] || Object.values(masterData).find(m => m.name === student.name);
        if (!master) return [];

        const cur = student.currentSkills || { EX: 1, NS: 1, PS: 1, SS: 1 };
        const tgt = student.targetSkills || { EX: 1, NS: 1, PS: 1, SS: 1 };

        if (master.EX) {
          for (let lv = cur.EX + 1; lv <= tgt.EX; lv++) {
            if (master.EX[lv]) Object.entries(master.EX[lv]).forEach(([item, count]) => { requirements[item] = (requirements[item] || 0) + count; });
          }
        }
        if (master.Other) {
          ['NS', 'PS', 'SS'].forEach(skill => {
            for (let lv = cur[skill] + 1; lv <= tgt[skill]; lv++) {
              if (master.Other[lv]) Object.entries(master.Other[lv]).forEach(([item, count]) => { requirements[item] = (requirements[item] || 0) + count; });
            }
          });
        }
        return sortMaterialsByDefaultOrder(Object.entries(requirements).map(([name, count]) => ({ name, count })));
      };

      const addStudent = async () => {
        if (!user || !selectedNewStudentId || !masterData) return;
        const targetMaster = masterData[selectedNewStudentId];
        
        if (students.find(s => s.studentId === selectedNewStudentId || s.name === targetMaster.name)) {
          alert("この生徒は既に登録されています。");
          return;
        }
        
        await db.collection(getCollectionPath(user.uid, 'students')).add({
          studentId: targetMaster.id,
          name: targetMaster.name,
          currentSkills: { EX: 1, NS: 1, PS: 1, SS: 1 },
          targetSkills: { EX: 1, NS: 1, PS: 1, SS: 1 },
          enabled: true,
          completed: false,
          createdAt: firebase.firestore.FieldValue.serverTimestamp()
        });
      };

      const deleteStudent = async (studentId) => {
        if (!user || !window.confirm("削除しますか？")) return;
        await db.doc(`${getCollectionPath(user.uid, 'students')}/${studentId}`).delete();
      };

      const toggleStudentEnabled = async (student) => {
        if (!user) return;
        await db.doc(`${getCollectionPath(user.uid, 'students')}/${student.id}`).update({
          enabled: student.enabled === false
        });
      };

      const toggleStudentCompleted = async (student) => {
        if (!user) return;
        await db.doc(`${getCollectionPath(user.uid, 'students')}/${student.id}`).update({
          completed: student.completed !== true
        });
      };

      const toggleStudentExpanded = (studentId) => {
        setExpandedStudentIds(prev => ({
          ...prev,
          [studentId]: prev[studentId] === false
        }));
      };

      const updateSkill = async (student, skillType, isTarget, value) => {
        if (!user) return;
        const curSkills = { ...(student.currentSkills || { EX: 1, NS: 1, PS: 1, SS: 1 }) };
        const tgtSkills = { ...(student.targetSkills || { EX: 1, NS: 1, PS: 1, SS: 1 }) };

        if (isTarget) {
          tgtSkills[skillType] = value;
          if (tgtSkills[skillType] < curSkills[skillType]) curSkills[skillType] = value;
        } else {
          curSkills[skillType] = value;
          if (curSkills[skillType] > tgtSkills[skillType]) tgtSkills[skillType] = value;
        }

        await db.doc(`${getCollectionPath(user.uid, 'students')}/${student.id}`).update({
          currentSkills: curSkills,
          targetSkills: tgtSkills
        });
      };

      const updateSingleItem = async (matName, count) => {
        if (!user) return;
        const newItems = { ...(inventory.items || {}) };
        newItems[matName] = count;
        const now = new Date().toLocaleString('ja-JP');
        await db.doc(`${getCollectionPath(user.uid, 'user_data')}/inventory`).set({ items: newItems, updatedAt: now }, { merge: true });
      };

      const handleImport = async () => {
        if (!user) return;
        const text = importText.trim();
        if (!text) return;
        
        const values = text.split(/[\s,]+/).map(v => parseInt(v, 10)).filter(v => !isNaN(v));
        
        if (values.length !== 80 && values.length !== 40) {
          alert(`データの数が合いません。80個（全グレード）または40個（上級・最上級のみ）の数値を入力してください。\n（現在認識した数: ${values.length}個）`);
          return;
        }

        const newItems = { ...(inventory.items || {}) };
        let vIndex = 0;

        OOPARTS_LIST.forEach(oopart => {
          if (values.length === 80) {
            GRADES.forEach(grade => {
              newItems[`${grade}${oopart}`] = values[vIndex++];
            });
          } else if (values.length === 40) {
            newItems[`上級${oopart}`] = values[vIndex++];
            newItems[`最上級${oopart}`] = values[vIndex++];
          }
        });

        const now = new Date().toLocaleString('ja-JP');
        await db.doc(`${getCollectionPath(user.uid, 'user_data')}/inventory`).set({ items: newItems, updatedAt: now }, { merge: true });
        setImportText("");
        alert("所持数の一括登録が完了しました！");
      };

      const handleReset = async () => {
        if (!user || !window.confirm("本当にすべての所持数と更新日時をリセット（0に）しますか？")) return;
        await db.doc(`${getCollectionPath(user.uid, 'user_data')}/inventory`).set({ items: {}, updatedAt: null });
      };

      const requestSort = (key) => {
        let direction = 'asc';
        if (sortConfig && sortConfig.key === key && sortConfig.direction === 'asc') {
          direction = 'desc';
        }
        setSortConfig({ key, direction });
      };

      const getSortIcon = (key) => {
        if (sortConfig.key !== key) return <span className="text-gray-300 text-xs ml-1">↕</span>;
        return sortConfig.direction === 'asc' ? <span className="text-blue-600 text-xs ml-1">▲</span> : <span className="text-blue-600 text-xs ml-1">▼</span>;
      };

      const dashboardData = () => {
        if (!masterData) return [];
        const totals = {};
        students.forEach(student => {
          if (student.enabled === false) return;
          const reqs = calcRequirements(student);
          reqs.forEach(req => {
            if (!totals[req.name]) totals[req.name] = 0;
            totals[req.name] += req.count;
          });
        });
        
        let data = [];
        Object.keys(totals).forEach(matName => {
          const requiredCount = totals[matName];
          const ownedCount = inventory.items?.[matName] || 0;
          data.push({ name: matName, required: requiredCount, owned: ownedCount, difference: ownedCount - requiredCount });
        });
        
        data = data.filter(item => {
          const grade = GRADES.find(g => item.name.startsWith(g));
          return grade ? gradeFilter[grade] : true;
        });

        data.sort((a, b) => {
          if (sortConfig.key === 'default') {
            return getMaterialOrder(a.name) - getMaterialOrder(b.name);
          }
          if (a[sortConfig.key] < b[sortConfig.key]) {
            return sortConfig.direction === 'asc' ? -1 : 1;
          }
          if (a[sortConfig.key] > b[sortConfig.key]) {
            return sortConfig.direction === 'asc' ? 1 : -1;
          }
          return 0;
        });

        return data;
      };

      if (dbError) {
        return <div className="flex flex-col h-screen items-center justify-center bg-red-50 text-red-600 p-4 text-center">
          <p className="font-bold mb-2">通信エラー</p>
          <p className="text-sm">{dbError}</p>
        </div>;
      }

      if (!user || isLoadingDB) {
        return <div className="flex flex-col h-screen items-center justify-center bg-blue-50 text-blue-900 gap-3">
          <IconRefresh />
          <p className="text-sm font-bold animate-pulse">最新のゲームデータを取得中...</p>
        </div>;
      }

      const studentDropdownList = Object.values(masterData).sort((a, b) => a.name.localeCompare(b.name, 'ja'));
      const getCreatedAtMillis = (student) => {
        if (student.createdAt?.toMillis) return student.createdAt.toMillis();
        if (typeof student.createdAt === 'number') return student.createdAt;
        return null;
      };
      const filteredStudents = students.filter(student => {
        const studentEnabled = student.enabled !== false;
        const studentCompleted = student.completed === true;
        if (hideCompletedStudents && studentCompleted) return false;
        if (studentEnabledFilter === 'enabled' && !studentEnabled) return false;
        if (studentEnabledFilter === 'disabled' && studentEnabled) return false;
        return true;
      });
      const sortedStudents = [...filteredStudents].sort((a, b) => {
        if (studentSortMode === 'created') {
          const aTime = getCreatedAtMillis(a);
          const bTime = getCreatedAtMillis(b);
          if (aTime !== null && bTime !== null && aTime !== bTime) return aTime - bTime;
          if (aTime !== null && bTime === null) return 1;
          if (aTime === null && bTime !== null) return -1;
          return (a.orderIndex || 0) - (b.orderIndex || 0);
        }
        return (a.name || '').localeCompare(b.name || '', 'ja');
      });
      const dashboardRows = dashboardData();

      return (
        <div className="flex flex-col h-screen text-gray-800 font-sans">
          <header className="bg-blue-600 text-white p-4 shadow-md flex justify-between items-center">
            <div className="flex items-center gap-2">
              <h1 className="text-xl font-bold">ブルアカ オーパーツ管理</h1>
            </div>
            <div className="text-xs opacity-80">ID: {user.uid.substring(0, 5)}</div>
          </header>

          <div className="flex bg-white shadow-sm border-b">
            <button onClick={() => setActiveTab('dashboard')} className={`flex-1 p-3 flex justify-center items-center gap-2 border-b-2 ${activeTab === 'dashboard' ? 'border-blue-600 text-blue-600 font-bold' : 'border-transparent text-gray-500'}`}>
              <IconChart /> 不足確認
            </button>
            <button onClick={() => setActiveTab('students')} className={`flex-1 p-3 flex justify-center items-center gap-2 border-b-2 ${activeTab === 'students' ? 'border-blue-600 text-blue-600 font-bold' : 'border-transparent text-gray-500'}`}>
              <IconUser /> 育成目標
            </button>
            <button onClick={() => setActiveTab('inventory')} className={`flex-1 p-3 flex justify-center items-center gap-2 border-b-2 ${activeTab === 'inventory' ? 'border-blue-600 text-blue-600 font-bold' : 'border-transparent text-gray-500'}`}>
              <IconPackage /> 所持数
            </button>
          </div>

          <main className="flex-1 overflow-y-auto p-4 max-w-3xl mx-auto w-full">
            
            {activeTab === 'dashboard' && (
              <div className="pb-8 animate-fade-in">
                <h2 className="text-lg font-bold mb-4 text-gray-700">必要オーパーツ集計</h2>

                <div className="bg-white p-4 rounded-lg shadow mb-4">
                  <div className="text-sm font-bold text-gray-700 mb-2">表示する素材グレード</div>
                  <div className="flex flex-wrap gap-4">
                    {GRADES.map(grade => (
                      <label key={grade} className="flex items-center gap-1 cursor-pointer select-none">
                        <input 
                          type="checkbox" 
                          checked={gradeFilter[grade]} 
                          onChange={(e) => setGradeFilter({...gradeFilter, [grade]: e.target.checked})}
                          className="w-4 h-4 text-blue-600 rounded border-gray-300 focus:ring-blue-500"
                        />
                        <span className="text-sm">{grade}</span>
                      </label>
                    ))}
                  </div>
                </div>

                <div className="bg-white rounded-lg shadow overflow-hidden">
                  <div className="p-2 border-b bg-gray-50">
                    <button
                      onClick={() => setSortConfig({ key: 'default', direction: 'asc' })}
                      className={`text-xs font-bold px-2 py-1 rounded border transition-colors ${sortConfig.key === 'default' ? 'bg-blue-50 text-blue-600 border-blue-200' : 'bg-white text-gray-500 border-gray-200 hover:bg-gray-100'}`}
                    >
                      標準順
                    </button>
                  </div>
                  <table className="w-full text-left border-collapse">
                    <thead>
                      <tr className="bg-gray-100 text-gray-600 text-sm select-none">
                        <th className="p-3 border-b cursor-pointer hover:bg-gray-200 transition-colors" onClick={() => requestSort('name')}>
                          オーパーツ名 {getSortIcon('name')}
                        </th>
                        <th className="p-3 border-b text-right cursor-pointer hover:bg-gray-200 transition-colors" onClick={() => requestSort('required')}>
                          必要 {getSortIcon('required')}
                        </th>
                        <th className="p-3 border-b text-right cursor-pointer hover:bg-gray-200 transition-colors" onClick={() => requestSort('owned')}>
                          所持 {getSortIcon('owned')}
                        </th>
                        <th className="p-3 border-b text-right cursor-pointer hover:bg-gray-200 transition-colors" onClick={() => requestSort('difference')}>
                          差分 {getSortIcon('difference')}
                        </th>
                      </tr>
                    </thead>
                    <tbody>
                      {dashboardRows.length === 0 ? (
                        <tr><td colSpan="4" className="p-6 text-center text-gray-400">条件に一致するデータがありません。</td></tr>
                      ) : (
                        dashboardRows.map((item, idx) => (
                          <tr key={idx} className="border-b hover:bg-gray-50 text-sm">
                            <td className="p-3 font-medium">{item.name}</td>
                            <td className="p-3 text-right">{item.required}</td>
                            <td className="p-3 text-right text-blue-600 font-semibold">{item.owned}</td>
                            <td className={`p-3 text-right font-bold ${item.difference < 0 ? 'text-red-500' : 'text-green-500'}`}>
                              {item.difference < 0 ? item.difference : `+${item.difference}`}
                            </td>
                          </tr>
                        ))
                      )}
                    </tbody>
                  </table>
                </div>
              </div>
            )}

            {activeTab === 'inventory' && (
              <div className="pb-8 animate-fade-in">
                <div className="flex justify-between items-end mb-4">
                  <h2 className="text-lg font-bold text-gray-700">所持数入力・CSVインポート</h2>
                  {inventory.updatedAt && (
                    <span className="text-xs text-gray-500 font-medium bg-gray-200 px-2 py-1 rounded">
                      最終更新: {inventory.updatedAt}
                    </span>
                  )}
                </div>

                <div className="bg-white p-4 rounded-lg shadow mb-6 border-t-4 border-blue-500">
                  <div className="flex justify-between items-center mb-2">
                    <h3 className="text-sm font-bold text-gray-700">AIからのCSVを貼り付け</h3>
                    <button onClick={handleReset} className="text-red-500 hover:text-red-700 text-xs flex items-center gap-1 font-bold bg-red-50 px-2 py-1 rounded">
                      <IconTrash /> 全リセット
                    </button>
                  </div>
                  <textarea
                    className="w-full border border-gray-300 rounded p-2 text-sm bg-gray-50 h-20 mb-3 focus:ring-2 focus:ring-blue-400 focus:outline-none"
                    placeholder="例: 10, 5, 2, 0, 15, 10... (80個の数字)"
                    value={importText}
                    onChange={(e) => setImportText(e.target.value)}
                  ></textarea>
                  <button onClick={handleImport} className="bg-gray-800 hover:bg-gray-900 text-white font-bold py-2 px-4 rounded text-sm w-full shadow transition-colors">
                    CSVから一括登録する
                  </button>
                </div>

                <div className="bg-white rounded-lg shadow overflow-x-auto">
                  <table className="w-full text-left border-collapse min-w-[400px]">
                    <thead>
                      <tr className="bg-gray-100 text-gray-600 text-xs text-center border-b-2">
                        <th className="p-2 border-r sticky left-0 bg-gray-100 shadow-[1px_0_0_0_#e5e7eb] z-10 text-left">オーパーツ名</th>
                        {GRADES.map(g => <th key={g} className="p-2 w-16">{g}</th>)}
                      </tr>
                    </thead>
                    <tbody>
                      {OOPARTS_LIST.map((oopart, idx) => (
                        <tr key={oopart} className={`border-b hover:bg-blue-50 transition-colors ${idx % 2 === 0 ? 'bg-white' : 'bg-gray-50'}`}>
                          <td className="p-2 font-medium text-xs sticky left-0 bg-inherit border-r shadow-[1px_0_0_0_#e5e7eb] z-10">
                            {oopart}
                          </td>
                          {GRADES.map(grade => {
                            const matName = `${grade}${oopart}`;
                            const count = inventory.items?.[matName] || 0;
                            return (
                              <td key={grade} className="p-1 text-center">
                                <InventoryInput 
                                  value={count} 
                                  onSave={(val) => updateSingleItem(matName, val)} 
                                />
                              </td>
                            );
                          })}
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
                <p className="text-xs text-gray-500 mt-3 text-center">※数値を変更して枠外をタップすると自動で保存されます。</p>
              </div>
            )}
            
            {activeTab === 'students' && (
              <div className="pb-8 animate-fade-in">
                <div className="bg-white p-4 rounded-lg shadow mb-6 space-y-3">
                  <div className="flex gap-2">
                    <select 
                      value={selectedNewStudentId} 
                      onChange={(e) => setSelectedNewStudentId(e.target.value)}
                      className="border rounded p-2 flex-1 text-sm bg-gray-50 focus:ring-2 focus:ring-blue-400 focus:outline-none"
                    >
                      {studentDropdownList.map(student => (
                        <option key={student.id} value={student.id}>{student.name}</option>
                      ))}
                    </select>
                    <button onClick={addStudent} className="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg flex items-center gap-1 text-sm shadow transition-colors">
                      <IconPlus /> 追加
                    </button>
                  </div>
                  <div className="flex flex-wrap items-center justify-between gap-3">
                    <div className="flex flex-wrap items-center gap-2">
                      <button
                        type="button"
                        onClick={() => setHideCompletedStudents(!hideCompletedStudents)}
                        className={`text-xs font-bold px-2 py-1.5 rounded border transition-colors ${hideCompletedStudents ? 'bg-green-50 text-green-700 border-green-200' : 'bg-gray-50 text-gray-500 border-gray-200 hover:bg-gray-100'}`}
                      >
                        育成完了した生徒を非表示
                      </button>
                      <div className="flex overflow-hidden rounded border border-gray-200">
                        {[
                          { value: 'all', label: '全体' },
                          { value: 'enabled', label: '集計対象のみ' },
                          { value: 'disabled', label: '集計対象外のみ' }
                        ].map(option => (
                          <button
                            key={option.value}
                            type="button"
                            onClick={() => setStudentEnabledFilter(option.value)}
                            className={`px-2 py-1.5 text-xs font-bold border-r last:border-r-0 transition-colors ${studentEnabledFilter === option.value ? 'bg-blue-50 text-blue-600 border-blue-200' : 'bg-white text-gray-500 border-gray-200 hover:bg-gray-50'}`}
                          >
                            {option.label}
                          </button>
                        ))}
                      </div>
                    </div>
                    <div className="flex items-center gap-2">
                      <span className="text-xs text-gray-500 font-medium">表示順</span>
                      <select
                        value={studentSortMode}
                        onChange={(e) => setStudentSortMode(e.target.value)}
                        className="border rounded p-1.5 text-xs bg-gray-50 focus:ring-2 focus:ring-blue-400 focus:outline-none"
                      >
                        <option value="name">あいうえお順</option>
                        <option value="created">登録順</option>
                      </select>
                    </div>
                  </div>
                </div>

                <div className="space-y-4">
                  {sortedStudents.map(student => {
                    const curSkills = student.currentSkills || { EX: 1, NS: 1, PS: 1, SS: 1 };
                    const tgtSkills = student.targetSkills || { EX: 1, NS: 1, PS: 1, SS: 1 };
                    const reqMats = calcRequirements(student);
                    const studentEnabled = student.enabled !== false;
                    const studentCompleted = student.completed === true;
                    const studentExpanded = expandedStudentIds[student.id] !== false;
                    
                    const displayName = student.name || "不明な生徒";

                    return (
                      <div key={student.id} className={`bg-white p-4 rounded-lg shadow border transition-opacity ${studentEnabled ? 'border-gray-100' : 'border-gray-200 opacity-60'}`}>
                        <div className={`flex justify-between items-center gap-3 ${studentExpanded ? 'mb-3 border-b pb-2' : ''}`}>
                          <button
                            type="button"
                            onClick={() => toggleStudentExpanded(student.id)}
                            aria-expanded={studentExpanded}
                            className="min-w-0 flex flex-1 items-center gap-2 text-left"
                          >
                            <span className="w-4 text-xs text-gray-400">{studentExpanded ? '▼' : '▶'}</span>
                            <h3 className={`font-bold text-lg truncate ${studentCompleted ? 'text-gray-500' : 'text-blue-900'}`}>{displayName}</h3>
                          </button>
                          <div className="flex flex-wrap items-center justify-end gap-2">
                            <button
                              type="button"
                              onClick={() => toggleStudentCompleted(student)}
                              aria-pressed={studentCompleted}
                              className={`text-xs font-bold px-2 py-1 rounded border transition-colors ${studentCompleted ? 'bg-green-50 text-green-700 border-green-200' : 'bg-gray-50 text-gray-500 border-gray-200 hover:bg-gray-100'}`}
                            >
                              育成完了
                            </button>
                            <button
                              type="button"
                              onClick={() => toggleStudentEnabled(student)}
                              aria-pressed={studentEnabled}
                              className={`relative inline-flex h-6 w-11 items-center rounded-full transition-colors ${studentEnabled ? 'bg-blue-600' : 'bg-gray-300'}`}
                              title={studentEnabled ? '集計対象' : '集計対象外'}
                            >
                              <span className={`inline-block h-5 w-5 transform rounded-full bg-white shadow transition-transform ${studentEnabled ? 'translate-x-5' : 'translate-x-0.5'}`}></span>
                            </button>
                            <span className={`text-[10px] font-bold w-16 ${studentEnabled ? 'text-blue-600' : 'text-gray-400'}`}>{studentEnabled ? '集計対象' : '集計対象外'}</span>
                            <button onClick={() => deleteStudent(student.id)} className="text-red-400 hover:text-red-600 p-1 transition-colors"><IconTrash /></button>
                          </div>
                        </div>
                        
                        {studentExpanded && (
                          <>
                            <div className="flex flex-wrap justify-between gap-y-3 bg-gray-50 p-3 rounded">
                              {['EX', 'NS', 'PS', 'SS'].map(skill => {
                                const isEX = skill === 'EX';
                                const maxLv = isEX ? 5 : 10;
                                return (
                                  <div key={skill} className="flex flex-col items-center">
                                    <span className="font-bold text-gray-700 text-sm mb-1">{skill}</span>
                                    <div className="flex items-end gap-1">
                                      <div className="flex flex-col items-center">
                                        <span className="text-[10px] text-gray-500 mb-0.5">現状</span>
                                        <select 
                                          value={curSkills[skill]} 
                                          onChange={(e) => updateSkill(student, skill, false, parseInt(e.target.value))} 
                                          className="border border-gray-300 rounded px-1 py-1 text-sm bg-white text-center w-12 focus:ring-1 focus:ring-blue-500 focus:outline-none"
                                        >
                                          {[...Array(maxLv)].map((_, i) => <option key={i+1} value={i+1}>{i+1}</option>)}
                                        </select>
                                      </div>
                                      
                                      <span className="text-gray-300 mb-1.5 text-xs">→</span>
                                      
                                      <div className="flex flex-col items-center">
                                        <span className="text-[10px] text-blue-600 font-medium mb-0.5">目標</span>
                                        <select 
                                          value={tgtSkills[skill]} 
                                          onChange={(e) => updateSkill(student, skill, true, parseInt(e.target.value))} 
                                          className="border border-blue-300 rounded px-1 py-1 text-sm bg-blue-50 font-bold text-blue-700 text-center w-12 focus:ring-1 focus:ring-blue-500 focus:outline-none"
                                        >
                                          {[...Array(maxLv)].map((_, i) => <option key={i+1} value={i+1}>{i+1}</option>)}
                                        </select>
                                      </div>
                                    </div>
                                  </div>
                                );
                              })}
                            </div>

                            <div className="mt-4 pt-3 border-t">
                              <div className="text-xs text-gray-500 mb-2">目標達成に必要な素材</div>
                              {reqMats.length === 0 ? (
                                <div className="text-sm text-gray-400">必要な素材はありません</div>
                              ) : (
                                <div className="flex flex-wrap gap-2">
                                  {reqMats.map(req => (
                                    <span key={req.name} className={`border text-xs px-2 py-1 rounded-full font-bold ${getGradeTagClasses(req.name)}`}>
                                      {req.name}: {req.count}
                                    </span>
                                  ))}
                                </div>
                              )}
                            </div>
                          </>
                        )}
                      </div>
                    )
                  })}
                  {students.length === 0 ? (
                    <div className="text-center p-8 bg-white rounded-lg shadow-sm text-gray-400 text-sm">
                      上の「追加」ボタンから育成したい生徒を登録してください
                    </div>
                  ) : sortedStudents.length === 0 && (
                    <div className="text-center p-8 bg-white rounded-lg shadow-sm text-gray-400 text-sm">
                      条件に一致する生徒がいません。
                    </div>
                  )}
                </div>
              </div>
            )}
            
          </main>
          <footer className="bg-white border-t px-4 py-3 text-[11px] text-gray-500">
            <div className="max-w-3xl mx-auto leading-relaxed space-y-1">
              <p>
                ゲームデータは
                <a
                  href="https://schaledb.com/"
                  target="_blank"
                  rel="noopener noreferrer"
                  className="text-blue-600 hover:underline font-bold mx-1"
                >
                  Schale DB
                </a>
                の公開データを活用しています。
              </p>
              <p>
                ブルーアーカイブ、ゲーム内情報、画像、アセット等の所有権および著作権は、それぞれの権利者に帰属します。本アプリはNexon、Nexon GamesおよびYostarとは一切関係ありません。
              </p>
            </div>
          </footer>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
